<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>ToolForge - Free Online Developer Tools</title>

<meta name="description" content="Free online developer tools: JSON formatter, Base64 encoder, UUID generator, JWT tools and more.">

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">
<link rel="icon" href="/favicon.ico" sizes="any">

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<header class="top-nav">
  <a href="/" class="top-nav-brand">ToolForge</a>
  <nav id="top-nav-menu" class="top-nav-menu" aria-label="Tool categories"></nav>
</header>

<div class="container">

<h1>ToolForge</h1>
<p class="subtitle">Free Online Developer Tools, JSON Tools, Base64 Tools, UUID Generator and More</p>

<input id="search" placeholder="Search tools..." onkeyup="searchTools()">

<section class="popular-tools">
  <h2 class="popular-tools-title">Popular Tools</h2>
  <div id="popular-tools-row" class="popular-tools-row"></div>
</section>

<div id="tool-list"></div>

<section class="about-tools">
  <h3 class="about-tools-heading">About ToolForge</h3>
  <p class="about-tools-text">ToolForge is a collection of free online developer tools including JSON tools, encoding utilities, password generators and more.</p>
</section>

</div>

<button id="back-to-top" class="back-to-top" aria-label="Back to top" title="Back to top">↑</button>

<script src="/js/index.js"></script>
<script>
(function(){
var btn=document.getElementById("back-to-top")
function toggle(){
btn.classList.toggle("visible",window.scrollY>200)
}
window.addEventListener("scroll",toggle,{passive:true})
toggle()
btn.addEventListener("click",function(){
window.scrollTo({top:0,behavior:"smooth"})
})
})()
</script>
</body>

</html>

<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

<main class="container">

<h1>Markdown Preview</h1>

<p class="subtitle">Type or paste Markdown and preview the rendered HTML instantly in your browser.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<label for="input" class="sr-only">Input text</label>
<textarea id="input" rows="10" style="width:90%" aria-label="Input text"></textarea>

<br><br>

<button onclick="render()">Preview</button>

<h3>Output</h3>

<div id="output"></div>

<p id="status" style="color:#666"></p>

</main>

<script>

function escapeHtml(text){
return text
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/\"/g,"&quot;")
.replace(/'/g,"&#39;")
}

function render(){

let text=document.getElementById("input").value

let safeText=escapeHtml(text)
document.getElementById("output").innerHTML=marked.parse(safeText)
document.getElementById("status").innerText="Preview rendered. Raw HTML is escaped for safety."

}

</script>

</body>
</html>

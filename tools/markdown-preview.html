<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Markdown Preview – Online Markdown Viewer | ToolForge</title>
<meta name="description" content="Free online Markdown Preview tool to render Markdown to HTML using marked.js in your browser. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

<div class="container">

<h1>Markdown Preview</h1>

<p class="subtitle">Type or paste Markdown and preview the rendered HTML instantly in your browser.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<textarea id="input" rows="10" style="width:90%"></textarea>

<br><br>

<button onclick="render()">Preview</button>

<h3>Output</h3>

<div id="output"></div>

<p id="status" style="color:#666"></p>

</div>

<script>

function escapeHtml(text){
return text
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/\"/g,"&quot;")
.replace(/'/g,"&#39;")
}

function render(){

let text=document.getElementById("input").value

let safeText=escapeHtml(text)
document.getElementById("output").innerHTML=marked.parse(safeText)
document.getElementById("status").innerText="Preview rendered. Raw HTML is escaped for safety."

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Base64 to Image Viewer – Convert Base64 to Image | ToolForge</title>
<meta name="description" content="Free online Base64 to Image Viewer to turn Base64 strings into previewable images. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container">

<h1>Base64 to Image Viewer</h1>

<p class="subtitle">Paste a Base64 string to preview the decoded image directly in your browser.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<textarea id="base64" rows="10" style="width:90%"></textarea>

<br><br>

<button onclick="show()">Preview</button>

<h3>Image</h3>

<img id="img" style="max-width:400px">

</div>

<script>

function show(){

let base64=document.getElementById("base64").value.trim()

document.getElementById("img").src=base64

}

</script>

</body>
</html>

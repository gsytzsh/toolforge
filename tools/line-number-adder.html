<body>
<main class="container">
<h1>Line Number Adder</h1>
<p class="subtitle">Add line numbers (1, 2, 3…) to each line of text.</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>Input</h3>
<label for="input" class="sr-only">Input text</label>
<textarea id="input" rows="10" style="width:90%" aria-label="Input text"></textarea>
<br><br>
<button onclick="add()">Add Line Numbers</button>
<h3>Result</h3>
<label for="output" class="sr-only">Output text</label>
<textarea id="output" rows="10" style="width:90%" aria-label="Output text"></textarea>
</main>
<script>
function add(){
var lines=document.getElementById("input").value.split(/\r?\n/)
document.getElementById("output").value=lines.map(function(l,i){return (i+1)+"\t"+l}).join("\n")
}
</script>
</body>

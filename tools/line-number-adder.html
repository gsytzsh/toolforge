<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Line Number Adder – Add Line Numbers to Text | ToolForge</title>
<meta name="description" content="Free online Line Number Adder to add line numbers to text. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
<h1>Line Number Adder</h1>
<p class="subtitle">Add line numbers (1, 2, 3…) to each line of text.</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>Input</h3>
<textarea id="input" rows="10" style="width:90%"></textarea>
<br><br>
<button onclick="add()">Add Line Numbers</button>
<h3>Result</h3>
<textarea id="output" rows="10" style="width:90%"></textarea>
</div>
<script>
function add(){
var lines=document.getElementById("input").value.split(/\r?\n/)
document.getElementById("output").value=lines.map(function(l,i){return (i+1)+"\t"+l}).join("\n")
}
</script>
</body>
</html>

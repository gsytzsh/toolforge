<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Base64 Encode – Free Online Encoder | ToolForge</title>
<meta name="description" content="Free online Base64 Encode tool to convert text into Base64 strings for HTTP, APIs and data URIs. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container">

<h1>Base64 Encode</h1>

<p class="subtitle">Encode text into Base64 strings for HTTP headers, API payloads and data URIs.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<textarea id="input" rows="8" style="width:90%" placeholder="Enter text"></textarea>

<br><br>

<button type="button" onclick="encode()">Encode</button>

<h3>Result</h3>

<textarea id="output" rows="8" style="width:90%"></textarea>

<p id="status" style="color:#666"></p>

</div>

<script>

function textToBase64(text){
const bytes=new TextEncoder().encode(text)
let binary=""
bytes.forEach(function(byte){
binary+=String.fromCharCode(byte)
})
return btoa(binary)
}

function encode(){

let input=document.getElementById("input").value

try{
document.getElementById("output").value=textToBase64(input)
document.getElementById("status").innerText="Encoded successfully."
document.getElementById("status").style.color="#16a34a"
}catch(e){
document.getElementById("output").value=""
document.getElementById("status").innerText="Encode failed."
document.getElementById("status").style.color="#b91c1c"
}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>HTML Escape / Unescape – Convert HTML Entities Online | ToolForge</title>
<meta name="description" content="Free online HTML Escape / Unescape tool to convert special characters to HTML entities and back. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container">

<h1>HTML Escape / Unescape</h1>

<p class="subtitle">Convert special characters to HTML entities and back when working with HTML, templates and emails.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<h3>Input</h3>
<textarea id="input" rows="8" style="width:90%" placeholder="<div>Hello &amp; welcome</div>"></textarea>

<br><br>

<button onclick="escapeHtml()">Escape</button>
<button onclick="unescapeHtml()">Unescape</button>

<h3 style="margin-top:24px">Output</h3>
<textarea id="output" rows="8" style="width:90%"></textarea>

</div>

<script>

function htmlEscape(str){
return str
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#39;")
}

function htmlUnescape(str){
return str
.replace(/&lt;/g,"<")
.replace(/&gt;/g,">")
.replace(/&quot;/g,'"')
.replace(/&#39;/g,"'")
.replace(/&amp;/g,"&")
}

function escapeHtml(){
let v=document.getElementById("input").value
document.getElementById("output").value=htmlEscape(v)
}

function unescapeHtml(){
let v=document.getElementById("input").value
document.getElementById("output").value=htmlUnescape(v)
}

</script>

</body>
</html>

<body>

<main class="container">

<h1>HTML Escape / Unescape</h1>

<p class="subtitle">Convert special characters to HTML entities and back when working with HTML, templates and emails.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<h3>Input</h3>
<label for="input" class="sr-only">HTML input</label>
<textarea id="input" rows="8" style="width:90%" placeholder="<div>Hello &amp; welcome</div>" aria-label="HTML input"></textarea>

<br><br>

<div class="tool-actions">
<button onclick="escapeHtml()">Escape</button>
<button onclick="unescapeHtml()">Unescape</button>
<button type="button" onclick="copyOutput()">Copy Result</button>
</div>

<h3 style="margin-top:24px">Output</h3>
<label for="output" class="sr-only">Output text</label>
<textarea id="output" rows="8" style="width:90%" aria-label="Output text"></textarea>

<p id="status" class="inline-status"></p>

</main>

<script>

function htmlEscape(str){
return str
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#39;")
}

function htmlUnescape(str){
return str
.replace(/&lt;/g,"<")
.replace(/&gt;/g,">")
.replace(/&quot;/g,'"')
.replace(/&#39;/g,"'")
.replace(/&amp;/g,"&")
}

function escapeHtml(){
let v=document.getElementById("input").value
document.getElementById("output").value=htmlEscape(v)
document.getElementById("status").innerText="Escaped successfully."
document.getElementById("status").style.color="#16a34a"
}

function unescapeHtml(){
let v=document.getElementById("input").value
document.getElementById("output").value=htmlUnescape(v)
document.getElementById("status").innerText="Unescaped successfully."
document.getElementById("status").style.color="#16a34a"
}

function copyOutput(){
let value=document.getElementById("output").value
if(!value){
document.getElementById("status").innerText="Nothing to copy."
document.getElementById("status").style.color="#b91c1c"
return
}
navigator.clipboard.writeText(value).then(function(){
document.getElementById("status").innerText="Result copied."
document.getElementById("status").style.color="#16a34a"
}).catch(function(){
document.getElementById("status").innerText="Copy failed."
document.getElementById("status").style.color="#b91c1c"
})
}

</script>

</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Interest Calculator – P × r × t | ToolForge</title>
<meta name="description" content="Free online Simple Interest Calculator: principal × rate × time. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
<h1>Simple Interest Calculator</h1>
<p class="subtitle">Calculate simple interest: I = P × r × t (principal, annual rate, years).</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>Principal</h3>
<input id="P" type="number" placeholder="1000" style="width:140px">
<h3>Annual rate %</h3>
<input id="r" type="number" step="0.01" placeholder="5" style="width:80px">
<h3>Time (years)</h3>
<input id="t" type="number" step="0.1" placeholder="2" style="width:80px">
<br><br>
<button onclick="calc()">Calculate</button>
<h3>Result</h3>
<p>Interest: <span id="interest"></span></p>
<p>Total (P + I): <span id="total"></span></p>
</div>
<script>
function calc(){
var P=parseFloat(document.getElementById("P").value)
var r=parseFloat(document.getElementById("r").value)/100
var t=parseFloat(document.getElementById("t").value)
if(!P||!t){document.getElementById("interest").innerText="";document.getElementById("total").innerText="Enter principal and time.";return}
var I=P*r*t
document.getElementById("interest").innerText=I.toFixed(2)
document.getElementById("total").innerText=(P+I).toFixed(2)
}
</script>
</body>
</html>

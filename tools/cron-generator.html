<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Cron Generator – Build Cron Expressions Online | ToolForge</title>
<meta name="description" content="Free online Cron Generator to build common cron expressions from simple minute, hour, day and month options. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="canonical" href="https://www.toolforge.site/tools/cron-generator.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="ToolForge">
<meta property="og:title" content="Cron Generator – Build Cron Expressions Online | ToolForge">
<meta property="og:description" content="Free online Cron Generator to build common cron expressions from simple minute, hour, day and month options. Part of the ToolForge developer tools collection.">
<meta property="og:url" content="https://www.toolforge.site/tools/cron-generator.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Cron Generator – Build Cron Expressions Online | ToolForge">
<meta name="twitter:description" content="Free online Cron Generator to build common cron expressions from simple minute, hour, day and month options. Part of the ToolForge developer tools collection.">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<main class="container">

<h1>Cron Generator</h1>

<p class="subtitle">Build common cron expressions from simple minute, hour, day and month options.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<h3>Minutes</h3>
<label for="min" class="sr-only">Minimum value</label>
<select id="min" aria-label="Minimum value">
<option value="*">Every minute</option>
<option value="0">At 0</option>
<option value="*/5">Every 5 minutes</option>
<option value="*/15">Every 15 minutes</option>
<option value="*/30">Every 30 minutes</option>
</select>

<h3>Hours</h3>
<label for="hour" class="sr-only">Hour</label>
<select id="hour" aria-label="Hour">
<option value="*">Every hour</option>
<option value="0">Midnight</option>
<option value="8">08:00</option>
<option value="12">12:00</option>
<option value="18">18:00</option>
</select>

<h3>Day of Month</h3>
<label for="dom" class="sr-only">Dom</label>
<select id="dom" aria-label="Dom">
<option value="*">Every day</option>
<option value="1">1st</option>
<option value="15">15th</option>
<option value="31">31st</option>
</select>

<h3>Month</h3>
<label for="mon" class="sr-only">Mon</label>
<select id="mon" aria-label="Mon">
<option value="*">Every month</option>
<option value="1">Jan</option>
<option value="4">Apr</option>
<option value="7">Jul</option>
<option value="10">Oct</option>
</select>

<h3>Day of Week</h3>
<label for="dow" class="sr-only">Dow</label>
<select id="dow" aria-label="Dow">
<option value="*">Every day</option>
<option value="1">Mon</option>
<option value="2">Tue</option>
<option value="3">Wed</option>
<option value="4">Thu</option>
<option value="5">Fri</option>
<option value="6">Sat</option>
<option value="0">Sun</option>
</select>

<br><br>

<button onclick="build()">Generate</button>

<h3 style="margin-top:24px">Cron Expression</h3>
<label for="cron" class="sr-only">Cron expression</label>
<input id="cron" style="width:260px" readonly aria-label="Cron expression">

</main>

<script>

function build(){
let min=document.getElementById("min").value
let hour=document.getElementById("hour").value
let dom=document.getElementById("dom").value
let mon=document.getElementById("mon").value
let dow=document.getElementById("dow").value
document.getElementById("cron").value=
min+" "+hour+" "+dom+" "+mon+" "+dow
}

</script>

</body>
</html>

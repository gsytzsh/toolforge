<body>

<main class="container">

<h1>URL Encode / Decode</h1>

<p class="subtitle">Encode and decode URLs and query strings safely for HTTP requests, redirects and API calls.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<textarea id="input" rows="8" style="width:90%" placeholder="Enter text or URL" aria-label="Input"></textarea>

<br><br>

<button onclick="encode()">Encode</button>
<button onclick="decode()">Decode</button>
<button onclick="clearText()">Clear</button>

<h3>Result</h3>

<textarea id="output" rows="8" style="width:90%" aria-label="Output"></textarea>

</main>

<script>

function encode(){

let text=document.getElementById("input").value

document.getElementById("output").value=
encodeURIComponent(text)

}

function decode(){

let text=document.getElementById("input").value

try{

document.getElementById("output").value=
decodeURIComponent(text)

}catch(e){

document.getElementById("output").value="Invalid encoded URL"

}

}

function clearText(){

document.getElementById("input").value=""
document.getElementById("output").value=""

}

</script>

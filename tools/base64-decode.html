<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7958678744111881" crossorigin="anonymous">
</script>
<meta charset="UTF-8">
<title>Base64 Decode – Free Online Decoder | ToolForge</title>
<meta name="description" content="Free online Base64 Decode tool to convert Base64 strings back to plain text or binary data. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container">

<h1>Base64 Decode</h1>

<p class="subtitle">Decode Base64 strings back to readable text or binary content directly in your browser.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<textarea id="input" rows="8" style="width:90%" placeholder="Enter Base64"></textarea>

<br><br>

<button type="button" onclick="decode()">Decode</button>

<h3>Result</h3>

<textarea id="output" rows="8" style="width:90%"></textarea>

</div>

<script>

function decode(){

let input=document.getElementById("input").value

try{

let result=atob(input)

document.getElementById("output").value=result

}catch(e){

document.getElementById("output").value="Invalid Base64"

}

}

</script>

</body>
</html>

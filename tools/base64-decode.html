<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Base64 Decode – Free Online Decoder | ToolForge</title>
<meta name="description" content="Free online Base64 Decode tool to convert Base64 strings back to plain text or binary data. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container">

<h1>Base64 Decode</h1>

<p class="subtitle">Decode Base64 strings back to readable text or binary content directly in your browser.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<textarea id="input" rows="8" style="width:90%" placeholder="Enter Base64"></textarea>

<br><br>

<button type="button" onclick="decode()">Decode</button>

<h3>Result</h3>

<textarea id="output" rows="8" style="width:90%"></textarea>

<p id="status" style="color:#666"></p>

</div>

<script>

function base64ToText(base64){
let binary=atob(base64)
let bytes=new Uint8Array(binary.length)
for(let i=0;i<binary.length;i++){
bytes[i]=binary.charCodeAt(i)
}
return new TextDecoder().decode(bytes)
}

function decode(){

let input=document.getElementById("input").value

try{

let result=base64ToText(input.trim())

document.getElementById("output").value=result
document.getElementById("status").innerText="Decoded successfully."
document.getElementById("status").style.color="#16a34a"

}catch(e){

document.getElementById("output").value=""
document.getElementById("status").innerText="Invalid Base64 input."
document.getElementById("status").style.color="#b91c1c"

}

}

</script>

</body>
</html>

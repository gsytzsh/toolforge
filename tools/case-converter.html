<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7958678744111881" crossorigin="anonymous">

<meta charset="UTF-8">
<title>Case Converter – Uppercase & Lowercase Text Online | ToolForge</title>
<meta name="description" content="Free online Case Converter to quickly switch text between UPPERCASE and lowercase. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container">

<h1>Case Converter</h1>

<p class="subtitle">Convert text to UPPERCASE or lowercase for titles, code and content formatting.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<textarea id="text" rows="10" style="width:90%" placeholder="Enter text"></textarea>

<br><br>

<button type="button" onclick="upper()">UPPERCASE</button>

<button type="button" onclick="lower()">lowercase</button>

</div>

<script>

function upper(){

let text=document.getElementById("text").value

document.getElementById("text").value=text.toUpperCase()

}

function lower(){

let text=document.getElementById("text").value

document.getElementById("text").value=text.toLowerCase()

}

</script>

</body>
</html>

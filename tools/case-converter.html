<meta charset="UTF-8">
<title>Case Converter - Free Online Tool</title>
<meta name="description" content="Case Converter free online tool">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container">

<h1>Case Converter</h1>

<textarea id="text" rows="10" style="width:90%" placeholder="Enter text"></textarea>

<br><br>

<button type="button" onclick="upper()">UPPERCASE</button>

<button type="button" onclick="lower()">lowercase</button>

</div>

<script>

function upper(){

let text=document.getElementById("text").value

document.getElementById("text").value=text.toUpperCase()

}

function lower(){

let text=document.getElementById("text").value

document.getElementById("text").value=text.toLowerCase()

}

</script>

</body>

<main class="container">

<h1>Case Converter</h1>

<p class="subtitle">Convert text to UPPERCASE or lowercase for titles, code and content formatting.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<label for="text" class="sr-only">Text input</label>
<textarea id="text" rows="10" style="width:90%" placeholder="Enter text" aria-label="Text input"></textarea>

<br><br>

<button type="button" onclick="upper()">UPPERCASE</button>

<button type="button" onclick="lower()">lowercase</button>

</main>

<script>

function upper(){

let text=document.getElementById("text").value

document.getElementById("text").value=text.toUpperCase()

}

function lower(){

let text=document.getElementById("text").value

document.getElementById("text").value=text.toLowerCase()

}

</script>

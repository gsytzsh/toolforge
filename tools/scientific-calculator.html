<body>
<main class="container">
<h1>Scientific Calculator</h1>
<p class="subtitle">Basic scientific operations: sin, cos, tan, sqrt, log, power (use deg for angles).</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>Expression</h3>
<label for="expr" class="sr-only">Expr</label>
<input id="expr" style="width:280px" placeholder="e.g. 2 + 3 * 4 or sin(0.5)" aria-label="Expr">
<br><br>
<button onclick="calc()">Calculate</button>
<h3>Result</h3>
<p id="result"></p>
</main>
<script>
function calc(){
var s=document.getElementById("expr").value.replace(/\s+/g,"").replace(/π/g,"Math.PI").replace(/√/g,"Math.sqrt")
s=s.replace(/sin\(/g,"Math.sin(").replace(/cos\(/g,"Math.cos(").replace(/tan\(/g,"Math.tan(")
s=s.replace(/log\(/g,"Math.log10(").replace(/ln\(/g,"Math.log(").replace(/sqrt\(/g,"Math.sqrt(")
s=s.replace(/\^/g,"**")
try{
var v=eval(s)
document.getElementById("result").innerText=typeof v==="number"&&isFinite(v)?v:"Invalid"
}catch(e){document.getElementById("result").innerText="Error: "+e.message}
}
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loan Calculator – Monthly Payment Calculator | ToolForge</title>
<meta name="description" content="Free online Loan Calculator to compute monthly payment from principal, rate and term. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
<h1>Loan Calculator</h1>
<p class="subtitle">Calculate monthly payment for a fixed-rate loan (principal, annual rate, years).</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>Principal</h3>
<input id="principal" type="number" placeholder="100000" style="width:140px">
<h3>Annual interest rate %</h3>
<input id="rate" type="number" step="0.01" placeholder="5" style="width:80px">
<h3>Term (years)</h3>
<input id="years" type="number" placeholder="30" style="width:80px">
<br><br>
<button onclick="calc()">Calculate</button>
<h3>Result</h3>
<p>Monthly payment: <span id="payment"></span></p>
<p>Total paid: <span id="total"></span></p>
</div>
<script>
function calc(){
var P=parseFloat(document.getElementById("principal").value)
var r=parseFloat(document.getElementById("rate").value)/100/12
var n=parseInt(document.getElementById("years").value,10)*12
if(!P||P<=0||!n){document.getElementById("payment").innerText="";document.getElementById("total").innerText="Enter valid values.";return}
var M=r?P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1):P/n
document.getElementById("payment").innerText=M.toFixed(2)
document.getElementById("total").innerText=(M*n).toFixed(2)
}
</script>
</body>
</html>

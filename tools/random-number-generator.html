<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="description" content="Free online Random Number Generator to pick random integers in a range, with support for multiple values and optional duplicates. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="canonical" href="https://www.toolforge.site/tools/random-number-generator.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="ToolForge">
<meta property="og:title" content="Random Number Generator – Generate Random Numbers Online | ToolForge">
<meta property="og:description" content="Free online Random Number Generator to pick random integers in a range, with support for multiple values and optional duplicates. Part of the ToolForge developer tools collection.">
<meta property="og:url" content="https://www.toolforge.site/tools/random-number-generator.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Random Number Generator – Generate Random Numbers Online | ToolForge">
<meta name="twitter:description" content="Free online Random Number Generator to pick random integers in a range, with support for multiple values and optional duplicates. Part of the ToolForge developer tools collection.">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<main class="container">

<h1>Random Number Generator</h1>

<p class="subtitle">Generate random integers in a custom range, with options for multiple values and unique picks.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<h3>Settings</h3>

<p>
Min:
<label for="min" class="sr-only">Min</label>
<input id="min" type="number" style="width:120px" value="1" aria-label="Min">
Max:
<label for="max" class="sr-only">Max</label>
<input id="max" type="number" style="width:120px" value="100" aria-label="Max">
</p>

<p>
How many numbers:
<label for="count" class="sr-only">Count</label>
<input id="count" type="number" style="width:120px" value="1" min="1" max="1000" aria-label="Count">
</p>

<p>
Allow duplicates?
<label style="margin-left:6px;font-size:13px;">
<input id="allowDup" type="checkbox" checked> Yes
</label>
</p>

<button onclick="generate()">Generate</button>

<h3 style="margin-top:24px">Result</h3>
<label for="output" class="sr-only">Output</label>
<textarea id="output" rows="8" style="width:90%" readonly aria-label="Output"></textarea>

<p id="status" style="color:#666;margin-top:8px">Ready.</p>

</main>

<script>

function setStatus(msg,isError){
let el=document.getElementById("status")
el.innerText=msg
el.style.color=isError?"#b91c1c":"#16a34a"
}

function generate(){

let min=parseInt(document.getElementById("min").value,10)
let max=parseInt(document.getElementById("max").value,10)
let count=parseInt(document.getElementById("count").value,10)
let allowDup=document.getElementById("allowDup").checked

if(isNaN(min)||isNaN(max)||isNaN(count)){
setStatus("Please enter valid numbers.",true)
return
}

if(max<min){
[min,max]=[max,min]
}

if(count<1){
count=1
document.getElementById("count").value="1"
}

if(count>1000){
count=1000
document.getElementById("count").value="1000"
}

let rangeSize=max-min+1

if(!allowDup && count>rangeSize){
setStatus("Count is larger than range size when duplicates are disabled.",true)
return
}

let result=[]

if(allowDup){
for(let i=0;i<count;i++){
let n=Math.floor(Math.random()*rangeSize)+min
result.push(n)
}
}else{
let pool=[]
for(let v=min;v<=max;v++){
pool.push(v)
}
for(let i=0;i<count;i++){
let idx=Math.floor(Math.random()*pool.length)
result.push(pool[idx])
pool.splice(idx,1)
}
}

document.getElementById("output").value=result.join(", ")
setStatus("Generated "+count+" number(s).",false)
}

</script>

</body>
</html>

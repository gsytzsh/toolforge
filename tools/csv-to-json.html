</head>

<body>

<main class="container">

<h1>CSV to JSON Converter</h1>

<p class="subtitle">Convert CSV data into JSON arrays for APIs, import/export, configuration and scripting.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<textarea id="csv" rows="10" style="width:90%" placeholder="name,age&#10;Tom,20&#10;Alice,25" aria-label="CSV input"></textarea>

<br><br>

<div class="tool-actions">
<button onclick="convert()">Convert</button>
<button type="button" onclick="copyOutput()">Copy Result</button>
</div>

<h3>JSON Result</h3>

<textarea id="json" rows="10" style="width:90%" aria-label="JSON input"></textarea>

<p id="status" style="color:#666"></p>

</main>

<script>

function parseCsv(text){
let rows=[]
let row=[]
let value=""
let inQuotes=false

for(let i=0;i<text.length;i++){
let ch=text[i]
let next=text[i+1]

if(ch==='"'){
if(inQuotes&&next==='"'){
value+='"'
i++
}else{
inQuotes=!inQuotes
}
}else if(ch===","&&!inQuotes){
row.push(value)
value=""
}else if((ch==="\n"||ch==="\r")&&!inQuotes){
if(ch==="\r"&&next==="\n") i++
row.push(value)
rows.push(row)
row=[]
value=""
}else{
value+=ch
}
}

row.push(value)
rows.push(row)
return rows.filter(function(item){
return item.length>1||item[0]!=="" 
})
}

function convert(){

let csv=document.getElementById("csv").value.trim()

if(!csv){
document.getElementById("json").value=""
document.getElementById("status").innerText="Enter CSV data."
document.getElementById("status").style.color="#b91c1c"
return
}

let rows=parseCsv(csv)

if(!rows.length){
document.getElementById("json").value=""
document.getElementById("status").innerText="No CSV rows found."
document.getElementById("status").style.color="#b91c1c"
return
}

let headers=rows[0]

let result=[]

for(let i=1;i<rows.length;i++){

let obj={}
let values=rows[i]

headers.forEach((h,index)=>{
obj[h]=values[index]
})

result.push(obj)

}

document.getElementById("json").value=
JSON.stringify(result,null,2)

document.getElementById("status").innerText="Converted successfully."
document.getElementById("status").style.color="#16a34a"

}

function copyOutput(){
let value=document.getElementById("json").value
if(!value){
document.getElementById("status").innerText="Nothing to copy."
document.getElementById("status").style.color="#b91c1c"
return
}
navigator.clipboard.writeText(value).then(function(){
document.getElementById("status").innerText="Result copied."
document.getElementById("status").style.color="#16a34a"
}).catch(function(){
document.getElementById("status").innerText="Copy failed."
document.getElementById("status").style.color="#b91c1c"
})
}

</script>

</body>
</html>

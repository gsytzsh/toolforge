<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Word Counter – Count Words and Characters Online | ToolForge</title>
<meta name="description" content="Free online Word Counter to count words in a text snippet. Part of the ToolForge developer tools collection.">
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container">

<h1>Word Counter</h1>

<p class="subtitle">Quickly count how many words a block of text contains.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<textarea id="text" rows="10" style="width:90%" placeholder="Enter text"></textarea>

<br><br>

<button onclick="countWords()">Count</button>

<h2 id="result"></h2>

</div>

<script>

function countWords(){

let text=document.getElementById("text").value.trim()

let words=text.split(/\s+/).filter(Boolean)

document.getElementById("result").innerText="Words: "+words.length

}

</script>

</body>
</html>

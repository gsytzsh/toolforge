<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Word Counter – Count Words and Characters Online | ToolForge</title>
<meta name="description" content="Free online Word Counter to count words in a text snippet. Part of the ToolForge developer tools collection.">
<link rel="canonical" href="https://www.toolforge.site/tools/word-counter.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="ToolForge">
<meta property="og:title" content="Word Counter – Count Words and Characters Online | ToolForge">
<meta property="og:description" content="Free online Word Counter to count words in a text snippet. Part of the ToolForge developer tools collection.">
<meta property="og:url" content="https://www.toolforge.site/tools/word-counter.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Word Counter – Count Words and Characters Online | ToolForge">
<meta name="twitter:description" content="Free online Word Counter to count words in a text snippet. Part of the ToolForge developer tools collection.">
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<main class="container">

<h1>Word Counter</h1>

<p class="subtitle">Quickly count how many words a block of text contains.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<label for="text" class="sr-only">Text input</label>
<textarea id="text" rows="10" style="width:90%" placeholder="Enter text" aria-label="Text input"></textarea>

<br><br>

<div class="tool-actions">
<button onclick="countWords()">Count</button>
<button type="button" onclick="copyResult()">Copy Result</button>
</div>

<h2 id="result"></h2>
<p id="status" class="inline-status"></p>

</main>

<script>

function countWords(){

let text=document.getElementById("text").value.trim()

let words=text.split(/\s+/).filter(Boolean)

document.getElementById("result").innerText="Words: "+words.length
document.getElementById("status").innerText="Counted successfully."
document.getElementById("status").style.color="#16a34a"

}

function copyResult(){
let value=document.getElementById("result").innerText
if(!value){
document.getElementById("status").innerText="Nothing to copy."
document.getElementById("status").style.color="#b91c1c"
return
}
navigator.clipboard.writeText(value).then(function(){
document.getElementById("status").innerText="Result copied."
document.getElementById("status").style.color="#16a34a"
}).catch(function(){
document.getElementById("status").innerText="Copy failed."
document.getElementById("status").style.color="#b91c1c"
})
}

</script>

</body>
</html>

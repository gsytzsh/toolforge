<body>

<main class="container">

<h1>Word Counter</h1>

<p class="subtitle">Quickly count how many words a block of text contains.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<label for="text" class="sr-only">Text input</label>
<textarea id="text" rows="10" style="width:90%" placeholder="Enter text" aria-label="Text input"></textarea>

<br><br>

<button onclick="countWords()">Count</button>

<h2 id="result"></h2>

</main>

<script>

function countWords(){

let text=document.getElementById("text").value.trim()

let words=text.split(/\s+/).filter(Boolean)

document.getElementById("result").innerText="Words: "+words.length

}

</script>

</body>

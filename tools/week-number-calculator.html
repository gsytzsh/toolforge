<body>
<main class="container">
<h1>Week Number Calculator</h1>
<p class="subtitle">Get the ISO 8601 week number (1–53) for a given date.</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>Date</h3>
<label for="d" class="sr-only">D</label>
<input id="d" type="date" aria-label="D">
<br><br>
<button onclick="calc()">Get Week Number</button>
<h3>Result</h3>
<p>Week number: <span id="result"></span></p>
<p>Year: <span id="year"></span></p>
</main>
<script>
function calc(){
var d=document.getElementById("d").value
if(!d){document.getElementById("result").innerText="";document.getElementById("year").innerText="Select a date.";return}
var dt=new Date(d+"T12:00:00")
var start=new Date(dt.getFullYear(),0,1)
var days=Math.floor((dt-start)/86400000)
var wn=Math.ceil((days+start.getDay()+1)/7)
var y=dt.getFullYear()
if(wn<1){wn=53;y--}
document.getElementById("result").innerText=wn
document.getElementById("year").innerText=y
}
</script>
</body>

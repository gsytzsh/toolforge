<meta charset="UTF-8">

<meta name="twitter:card" content="summary">

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<main class="container">

<h1>Image to Base64 Converter</h1>

<p class="subtitle">Upload an image and convert it into a Base64 data URL for HTML, CSS, emails and more.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<label for="file" class="sr-only">File</label>
<input type="file" id="file" aria-label="File">

<br><br>

<button onclick="convert()">Convert</button>

<h3>Base64 Result</h3>

<label for="result" class="sr-only">Result text</label>
<textarea id="result" rows="10" style="width:90%" aria-label="Result text"></textarea>

</main>

<script>

function convert(){

let file=document.getElementById("file").files[0]

if(!file){
alert("Select image first")
return
}

let reader=new FileReader()

reader.onload=function(e){

document.getElementById("result").value=e.target.result

}

reader.readAsDataURL(file)

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Image to Base64 Converter - ToolForge</title>
<meta name="description" content="Image To Base64 free online tool">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container">

<h1>Image to Base64 Converter</h1>

<p>Upload an image to convert it into Base64.</p>

<input type="file" id="file">

<br><br>

<button onclick="convert()">Convert</button>

<h3>Base64 Result</h3>

<textarea id="result" rows="10" style="width:90%"></textarea>

</div>

<script>

function convert(){

let file=document.getElementById("file").files[0]

if(!file){
alert("Select image first")
return
}

let reader=new FileReader()

reader.onload=function(e){

document.getElementById("result").value=e.target.result

}

reader.readAsDataURL(file)

}

</script>

</body>
</html>

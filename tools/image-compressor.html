<body>

<main class="container">

<h1>Image Compressor</h1>

<p class="subtitle">Upload an image and compress it in your browser to reduce file size before uploading.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<input type="file" id="file" aria-label="File">

<br><br>

<button onclick="compress()">Compress</button>

<br><br>

<img id="preview" style="max-width:400px">

</main>

<script>

function compress(){

let file=document.getElementById("file").files[0]

if(!file){
alert("Select image")
return
}

let reader=new FileReader()

reader.onload=function(e){

let img=new Image()

img.onload=function(){

let canvas=document.createElement("canvas")

let ctx=canvas.getContext("2d")

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

let compressed=canvas.toDataURL("image/jpeg",0.6)

document.getElementById("preview").src=compressed

}

img.src=e.target.result

}

reader.readAsDataURL(file)

}

</script>

</body>

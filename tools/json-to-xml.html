<body>
<main class="container">
<h1>JSON to XML</h1>
<p class="subtitle">Convert JSON to XML. Objects become elements, arrays repeat the key.</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>JSON</h3>
<textarea id="json" rows="10" style="width:90%" placeholder='{"name":"Tom","age":20}' aria-label="JSON input"></textarea>
<br><br>
<button onclick="convert()">Convert to XML</button>
<h3>XML</h3>
<textarea id="xml" rows="10" style="width:90%" aria-label="XML input"></textarea>
<p id="status" style="color:#666"></p>
</main>
<script>
function escapeXml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function toXml(key,val,level){
var pad="  ".repeat(level||0)
if(typeof val!=="object"||val===null){
return pad+"<"+key+">"+escapeXml(String(val))+"</"+key+">\n"
}
if(Array.isArray(val)){
var arr=""
val.forEach(function(v){arr+=toXml(key,v,level)})
return arr
}
var attrs=""
var content=""
for(var k in val){
if(k==="@attributes"&&val[k]&&typeof val[k]==="object"){
for(var attr in val[k]) attrs+=" "+attr+'="'+escapeXml(val[k][attr])+'"'
}else if(k==="#text"){
content+=escapeXml(String(val[k]))
}else{
content+="\n"+toXml(k,val[k],(level||0)+1)
}
}
if(!content){
return pad+"<"+key+attrs+"></"+key+">\n"
}
if(content.indexOf("\n")===-1){
return pad+"<"+key+attrs+">"+content+"</"+key+">\n"
}
return pad+"<"+key+attrs+">"+content+pad+"</"+key+">\n"
}
function convert(){
try{
var obj=JSON.parse(document.getElementById("json").value||"{}")
document.getElementById("xml").value=('<?xml version="1.0" encoding="UTF-8"?>\n'+toXml("root",obj,0)).trim()
document.getElementById("status").innerText="OK."
document.getElementById("status").style.color="#16a34a"
}catch(e){document.getElementById("status").innerText="Error: "+e.message
document.getElementById("status").style.color="#b91c1c"}
}
</script>
</body>
</html>

<meta charset="UTF-8">

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<main class="container">

<h1>Curl to Fetch Converter</h1>

<p class="subtitle">Convert curl commands into JavaScript fetch code snippets for browser and Node.js.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<label for="curl" class="sr-only">cURL command</label>
<textarea id="curl" rows="10" style="width:90%" placeholder="Paste curl command" aria-label="cURL command"></textarea>

<br><br>

<div class="tool-actions">
<button onclick="convert()">Convert</button>
<button type="button" onclick="copyResult()">Copy Result</button>
</div>

<h3>Fetch Code</h3>

<label for="result" class="sr-only">Result text</label>
<textarea id="result" rows="12" style="width:90%" aria-label="Result text"></textarea>

<p id="status" class="inline-status"></p>

</main>

<script>

function convert(){

let curl=document.getElementById("curl").value

let urlMatch=curl.match(/curl\s+['"]?([^'"\s]+)/)
let url=urlMatch?urlMatch[1]:""

let methodMatch=curl.match(/-X\s+(\w+)/)
let method=methodMatch?methodMatch[1]:"GET"

let headers={}
let headerMatches=[...curl.matchAll(/-H\s+['"]([^:]+):\s*(.*?)['"]/g)]

headerMatches.forEach(h=>{
headers[h[1]]=h[2]
})

let bodyMatch=curl.match(/-d\s+['"](.+?)['"]/)
let body=bodyMatch?bodyMatch[1]:""

let fetchCode=`fetch("${url}", {
  method: "${method}",
  headers: ${JSON.stringify(headers,null,2)},`

if(body){
fetchCode+=`

  body: ${JSON.stringify(body)}`
}

fetchCode+=`
})
.then(res => res.json())
.then(data => console.log(data));
`

document.getElementById("result").value=fetchCode
document.getElementById("status").innerText="Converted successfully."
document.getElementById("status").style.color="#16a34a"

}

function copyResult(){
let value=document.getElementById("result").value
if(!value){
document.getElementById("status").innerText="Nothing to copy."
document.getElementById("status").style.color="#b91c1c"
return
}
navigator.clipboard.writeText(value).then(function(){
document.getElementById("status").innerText="Fetch code copied."
document.getElementById("status").style.color="#16a34a"
}).catch(function(){
document.getElementById("status").innerText="Copy failed."
document.getElementById("status").style.color="#b91c1c"
})
}

</script>

</body>

</html>

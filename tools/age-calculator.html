<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Age Calculator – Calculate Age from Birth Date | ToolForge</title>
<meta name="description" content="Free online Age Calculator to compute age from date of birth. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
<h1>Age Calculator</h1>
<p class="subtitle">Enter date of birth to get age in years, months and days (from today).</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>Date of birth</h3>
<input id="dob" type="date">
<br><br>
<button onclick="calc()">Calculate Age</button>
<h3>Result</h3>
<p id="result"></p>
</div>
<script>
function calc(){
var dob=document.getElementById("dob").value
if(!dob){document.getElementById("result").innerText="Select date of birth.";return}
var b=new Date(dob)
var t=new Date()
if(b>t){document.getElementById("result").innerText="Date of birth must be in the past.";return}
var y=t.getFullYear()-b.getFullYear()
var m=t.getMonth()-b.getMonth()
var d=t.getDate()-b.getDate()
if(d<0){m--;d+=new Date(t.getFullYear(),t.getMonth(),0).getDate()}
if(m<0){y--;m+=12}
document.getElementById("result").innerText=y+" years, "+m+" months, "+d+" days"
}
</script>
</body>
</html>

<body>

<main class="container">

<h1>Timezone Converter</h1>

<p class="subtitle">Pick a date and time, then see it displayed in your chosen timezone.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<h3>Date & Time</h3>
<input type="datetime-local" id="time" aria-label="Time">

<h3>Target Timezone</h3>
<select id="zone" aria-label="Zone">
<option value="UTC">UTC</option>
<option value="Asia/Shanghai">Asia/Shanghai</option>
<option value="America/New_York">New York</option>
<option value="Europe/London">London</option>
</select>

<br><br>

<button onclick="convert()">Convert</button>

<h3 style="margin-top:24px">Result</h3>
<pre id="result"></pre>

</main>

<script>

function convert(){

let t=document.getElementById("time").value
let zone=document.getElementById("zone").value

if(!t){
document.getElementById("result").textContent="Please select date and time."
return
}

let d=new Date(t)
let res=d.toLocaleString("en-US",{timeZone:zone})

document.getElementById("result").textContent=res

}

</script>

</body>

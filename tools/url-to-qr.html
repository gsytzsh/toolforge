<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7958678744111881" crossorigin="anonymous">
</script>
<meta charset="UTF-8">
<title>URL to QR Code Generator – Create QR Codes from URLs | ToolForge</title>
<meta name="description" content="Free online URL to QR Code Generator to turn any website link into a QR code image. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">

<script src="/js/qrcode.min.js"></script>

</head>

<body>

<div class="container">

<h1>URL to QR Code Generator</h1>

<p class="subtitle">Convert any website URL into a QR code image you can share or print.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<input id="url" placeholder="https://example.com" style="width:70%;padding:10px">

<br><br>

<button onclick="generateQR()">Generate</button>

<div id="qrcode" style="margin-top:30px"></div>

</div>

<script>

function generateQR(){

document.getElementById("qrcode").innerHTML=""

var url=document.getElementById("url").value

new QRCode(document.getElementById("qrcode"),{
text:url,
width:256,
height:256
})

}

</script>

</body>
</html>

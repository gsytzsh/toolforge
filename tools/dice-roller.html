</head>
<body>
<main class="container">
<h1>Dice Roller</h1>
<p class="subtitle">Roll dice: e.g. 2d6 = two 6-sided dice, 1d20 = one 20-sided die.</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>Number of dice</h3>
<input id="n" type="number" min="1" max="20" value="2" style="width:60px" aria-label="N">
<h3>Sides per die</h3>
<input id="sides" type="number" min="2" max="100" value="6" style="width:60px" aria-label="Sides">
<br><br>
<button onclick="roll()">Roll</button>
<h3>Result</h3>
<p>Rolls: <span id="rolls"></span></p>
<p>Sum: <span id="sum"></span></p>
</main>
<script>
function roll(){
var n=parseInt(document.getElementById("n").value,10)||1
var s=parseInt(document.getElementById("sides").value,10)||6
n=Math.max(1,Math.min(20,n))
s=Math.max(2,Math.min(100,s))
var arr=[]
for(var i=0;i<n;i++)arr.push(1+Math.floor(Math.random()*s))
var sum=arr.reduce(function(a,b){return a+b},0)
document.getElementById("rolls").innerText=arr.join(", ")
document.getElementById("sum").innerText=sum
}
</script>
</body>

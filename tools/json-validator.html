<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JSON Validator – Validate JSON Online | ToolForge</title>
<meta name="description" content="Free online JSON Validator to check if JSON is valid and see error location. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="canonical" href="https://www.toolforge.site/tools/json-validator.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="ToolForge">
<meta property="og:title" content="JSON Validator – Validate JSON Online | ToolForge">
<meta property="og:description" content="Free online JSON Validator to check if JSON is valid and see error location. Part of the ToolForge developer tools collection.">
<meta property="og:url" content="https://www.toolforge.site/tools/json-validator.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="JSON Validator – Validate JSON Online | ToolForge">
<meta name="twitter:description" content="Free online JSON Validator to check if JSON is valid and see error location. Part of the ToolForge developer tools collection.">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main class="container">
<h1>JSON Validator</h1>
<p class="subtitle">Paste JSON to validate. If invalid, see the error message and approximate position.</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>JSON</h3>
<label for="json" class="sr-only">JSON input</label>
<textarea id="json" rows="12" style="width:90%;font-family:monospace" placeholder='{"key": "value"}' aria-label="JSON input"></textarea>
<br><br>
<div class="tool-actions">
<button onclick="validate()">Validate</button>
<button type="button" onclick="copyInput()">Copy JSON</button>
</div>
<h3>Result</h3>
<p id="result"></p>
</main>
<script>
function validate(){
var s=document.getElementById("json").value
try{
JSON.parse(s)
document.getElementById("result").innerText="Valid JSON."
document.getElementById("result").style.color="#16a34a"
}catch(e){
document.getElementById("result").innerText="Invalid: "+e.message
document.getElementById("result").style.color="#b91c1c"
}
}

function copyInput(){
var value=document.getElementById("json").value
if(!value){
document.getElementById("result").innerText="Nothing to copy."
document.getElementById("result").style.color="#b91c1c"
return
}
navigator.clipboard.writeText(value).then(function(){
document.getElementById("result").innerText="JSON copied."
document.getElementById("result").style.color="#16a34a"
}).catch(function(){
document.getElementById("result").innerText="Copy failed."
document.getElementById("result").style.color="#b91c1c"
})
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Regex Tester – Online Regular Expression Tester | ToolForge</title>
<meta name="description" content="Free online Regex Tester to quickly test JavaScript regular expressions against sample text and see matches. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="canonical" href="https://www.toolforge.site/tools/regex-tester.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="ToolForge">
<meta property="og:title" content="Regex Tester – Online Regular Expression Tester | ToolForge">
<meta property="og:description" content="Free online Regex Tester to quickly test JavaScript regular expressions against sample text and see matches. Part of the ToolForge developer tools collection.">
<meta property="og:url" content="https://www.toolforge.site/tools/regex-tester.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Regex Tester – Online Regular Expression Tester | ToolForge">

<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<main class="container">

<h1>Regex Tester</h1>

<p class="subtitle">Test JavaScript regular expressions against text, debug patterns and see all matches instantly.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<label for="pattern" class="sr-only">Regex pattern</label>
<input id="pattern" placeholder="Regex pattern" aria-label="Regex pattern">

<label for="text" class="sr-only">Text input</label>
<textarea id="text" rows="8" style="width:90%" placeholder="Text" aria-label="Text input"></textarea>

<br><br>

<div class="tool-actions">
<button onclick="test()">Test</button>
<button type="button" onclick="copyResult()">Copy Matches</button>
</div>

<h3>Matches</h3>

<pre id="result"></pre>
<p id="status" class="inline-status"></p>

</main>

<script>

function test(){

let pattern=document.getElementById("pattern").value

let text=document.getElementById("text").value

try{

let regex=new RegExp(pattern,"g")

let matches=text.match(regex)

document.getElementById("result").innerText=
matches?matches.join("\n"):"No match"
document.getElementById("status").innerText="Regex tested."
document.getElementById("status").style.color="#16a34a"

}catch(e){

document.getElementById("result").innerText="Invalid regex"
document.getElementById("status").innerText="Invalid regular expression."
document.getElementById("status").style.color="#b91c1c"

}

}

function copyResult(){
let value=document.getElementById("result").innerText.trim()
if(!value){
document.getElementById("status").innerText="Nothing to copy."
document.getElementById("status").style.color="#b91c1c"
return
}
navigator.clipboard.writeText(value).then(function(){
document.getElementById("status").innerText="Matches copied."
document.getElementById("status").style.color="#16a34a"
}).catch(function(){
document.getElementById("status").innerText="Copy failed."
document.getElementById("status").style.color="#b91c1c"
})
}

</script>

</body>
</html>

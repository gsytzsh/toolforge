<head>

<meta charset="UTF-8">

</head>

<body>

<main class="container">

<h1>IP Info Lookup</h1>

<p class="subtitle">Get IP address location, city, country and ASN, and see your own IP with city and country directly in the browser.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<h3>Your IP</h3>
<p id="self-ip">Detecting your IP...</p>

<label for="ip" class="sr-only">Ip</label>
<input id="ip" placeholder="Enter IP address" aria-label="Ip">

<div class="tool-actions">
<button onclick="lookup()">Lookup</button>
<button type="button" onclick="copyResult()">Copy Result</button>
</div>

<h3>Result</h3>

<pre id="result"></pre>
<p id="status" class="inline-status"></p>

</main>

<script>

async function loadSelfIP(){

try{

let res=await fetch("https://ipapi.co/json/")
let data=await res.json()

if(data && data.ip){
let locationParts=[
data.city,
data.region,
data.country_name||data.country
].filter(Boolean)
document.getElementById("self-ip").innerText=
data.ip+"  ·  "+(locationParts.length?locationParts.join(", "):"Unknown location")
document.getElementById("status").innerText=""
}else{
document.getElementById("self-ip").innerText="Unable to detect your IP."
}

}catch(e){

document.getElementById("self-ip").innerText="Unable to detect your IP."

}

}

async function lookup(){

let ip=document.getElementById("ip").value.trim()

if(!ip){

document.getElementById("result").innerText="Enter IP address"
document.getElementById("status").innerText="Enter an IP address first."
document.getElementById("status").style.color="#b91c1c"
return

}

try{

let res=await fetch("https://ipapi.co/"+ip+"/json/")

let data=await res.json()

if(data.error){
document.getElementById("result").innerText=data.reason||"Lookup failed"
document.getElementById("status").innerText="Lookup failed."
document.getElementById("status").style.color="#b91c1c"
return
}

let lines=[
"IP: "+(data.ip||ip),
"City: "+(data.city||"Unknown"),
"Region: "+(data.region||"Unknown"),
"Country: "+(data.country_name||data.country||"Unknown"),
"Postal: "+(data.postal||"Unknown"),
"Timezone: "+(data.timezone||"Unknown"),
"ASN: "+(data.asn||"Unknown"),
"Org: "+(data.org||"Unknown")
]

document.getElementById("result").innerText=lines.join("\n")
document.getElementById("status").innerText="Lookup completed."
document.getElementById("status").style.color="#16a34a"

}catch(e){

document.getElementById("result").innerText="Lookup failed"
document.getElementById("status").innerText="Lookup failed."
document.getElementById("status").style.color="#b91c1c"

}

}

function copyResult(){
let value=document.getElementById("result").innerText.trim()
if(!value){
document.getElementById("status").innerText="Nothing to copy."
document.getElementById("status").style.color="#b91c1c"
return
}
navigator.clipboard.writeText(value).then(function(){
document.getElementById("status").innerText="Result copied."
document.getElementById("status").style.color="#16a34a"
}).catch(function(){
document.getElementById("status").innerText="Copy failed."
document.getElementById("status").style.color="#b91c1c"
})
}

document.getElementById("ip").addEventListener("keydown",function(e){
if(e.key==="Enter"){
e.preventDefault()
lookup()
}
})

loadSelfIP()

</script>

</body>

</html>

<body>

<main class="container">

<h1>IP Info Lookup</h1>

<p class="subtitle">Get IP address location, city, country and ASN, and see your own IP and city directly in the browser.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<h3>Your IP</h3>
<p id="self-ip">Detecting your IP...</p>

<label for="ip" class="sr-only">Ip</label>
<input id="ip" placeholder="Enter IP address" aria-label="Ip">

<button onclick="lookup()">Lookup</button>

<h3>Result</h3>

<pre id="result"></pre>

</main>

<script>

async function loadSelfIP(){

try{

let res=await fetch("https://ipapi.co/json/")
let data=await res.json()

if(data && data.ip){
let city=data.city||"Unknown city"
document.getElementById("self-ip").innerText=
data.ip+"  ·  "+city
}else{
document.getElementById("self-ip").innerText="Unable to detect your IP."
}

}catch(e){

document.getElementById("self-ip").innerText="Unable to detect your IP."

}

}

async function lookup(){

let ip=document.getElementById("ip").value.trim()

if(!ip){

document.getElementById("result").innerText="Enter IP address"
return

}

try{

let res=await fetch("https://ipapi.co/"+ip+"/json/")

let data=await res.json()

document.getElementById("result").innerText=
JSON.stringify(data,null,2)

}catch(e){

document.getElementById("result").innerText="Lookup failed"

}

}

loadSelfIP()

</script>

</body>

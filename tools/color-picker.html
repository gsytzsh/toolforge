<body>

<main class="container">

<h1>Color Picker</h1>

<p class="subtitle">Pick a color and instantly copy its HEX value for CSS, design and branding work.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<label for="color" class="sr-only">Color</label>
<input type="color" id="color" aria-label="Color">

<h3>HEX</h3>

<p id="hex"></p>

<button type="button" onclick="copyHex()">Copy HEX</button>
<p id="status" style="color:#666"></p>

</main>

<script>

let picker=document.getElementById("color")

document.getElementById("hex").innerText=picker.value

picker.addEventListener("input",function(){

document.getElementById("hex").innerText=this.value

})

function copyHex(){
let value=document.getElementById("hex").innerText
if(!value) return
navigator.clipboard.writeText(value).then(function(){
document.getElementById("status").innerText="HEX copied."
document.getElementById("status").style.color="#16a34a"
}).catch(function(){
document.getElementById("status").innerText="Copy failed."
document.getElementById("status").style.color="#b91c1c"
})
}

</script>

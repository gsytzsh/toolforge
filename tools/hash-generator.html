<body>
<main class="container">

<h1>Hash Generator</h1>

<p class="subtitle">Generate SHA-256 hashes of text directly in your browser for checksums and security.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<textarea id="input" rows="8" style="width:90%" placeholder="Enter text" aria-label="Input"></textarea>

<br><br>

<button onclick="generate('SHA-256')">SHA256</button>

<h3>Result</h3>
<textarea id="output" rows="5" style="width:90%" aria-label="Output"></textarea>

</main>

<script>

async function generate(type){

let text=document.getElementById("input").value

let encoder=new TextEncoder()
let data=encoder.encode(text)

let hash=await crypto.subtle.digest(type,data)

let hex=[...new Uint8Array(hash)]
.map(b=>b.toString(16).padStart(2,"0"))
.join("")

document.getElementById("output").value=hex

}

</script>

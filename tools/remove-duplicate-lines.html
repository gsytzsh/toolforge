<body>
<main class="container">
<h1>Remove Duplicate Lines</h1>
<p class="subtitle">Paste text with one item per line; duplicate lines are removed (first occurrence kept).</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>Input</h3>
<label for="input" class="sr-only">Input</label>
<textarea id="input" rows="10" style="width:90%" aria-label="Input"></textarea>
<br><br>
<button onclick="dedupe()">Remove Duplicates</button>
<h3>Result</h3>
<label for="output" class="sr-only">Output</label>
<textarea id="output" rows="10" style="width:90%" aria-label="Output"></textarea>
</main>
<script>
function dedupe(){
var lines=document.getElementById("input").value.split(/\r?\n/)
var seen=new Set()
var out=lines.filter(function(l){if(seen.has(l))return false;seen.add(l);return true})
document.getElementById("output").value=out.join("\n")
}
</script>
</body>

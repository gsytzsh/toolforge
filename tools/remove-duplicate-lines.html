<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Remove Duplicate Lines – Dedupe Lines Online | ToolForge</title>
<meta name="description" content="Free online tool to remove duplicate lines from text, keeping first occurrence. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
<h1>Remove Duplicate Lines</h1>
<p class="subtitle">Paste text with one item per line; duplicate lines are removed (first occurrence kept).</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>Input</h3>
<textarea id="input" rows="10" style="width:90%"></textarea>
<br><br>
<button onclick="dedupe()">Remove Duplicates</button>
<h3>Result</h3>
<textarea id="output" rows="10" style="width:90%"></textarea>
</div>
<script>
function dedupe(){
var lines=document.getElementById("input").value.split(/\r?\n/)
var seen=new Set()
var out=lines.filter(function(l){if(seen.has(l))return false;seen.add(l);return true})
document.getElementById("output").value=out.join("\n")
}
</script>
</body>
</html>

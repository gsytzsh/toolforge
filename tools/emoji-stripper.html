<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Emoji Remover – Remove Emojis from Text | ToolForge</title>
<meta name="description" content="Free online Emoji Remover to strip emoji characters from text while keeping normal letters and punctuation. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container">

<h1>Emoji Remover</h1>

<p class="subtitle">Strip emoji characters from text while keeping normal letters, numbers and punctuation.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<h3>Input</h3>
<textarea id="input" rows="8" style="width:90%" placeholder="Hello 👋 world 🌍!"></textarea>

<br><br>

<button onclick="strip()">Remove Emojis</button>

<h3 style="margin-top:24px">Output</h3>
<textarea id="output" rows="8" style="width:90%"></textarea>

</div>

<script>

function stripEmojis(str){
// Basic removal for common emoji ranges
return str.replace(/[\u2190-\u21FF\u2300-\u23FF\u2600-\u27BF\u1F000-\u1FAFF]/g,"")
}

function strip(){
let v=document.getElementById("input").value
document.getElementById("output").value=stripEmojis(v)
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Cron Expression Parser - ToolForge</title>

<meta name="description" content="Cron Parser free online tool">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container">

<h1>Cron Expression Parser</h1>

<p>Understand when a cron job will run.</p>

<input id="cron" style="width:320px" placeholder="Example: */5 * * * *">

<br><br>

<button onclick="parseCron()">Parse</button>

<h3>Result</h3>

<p id="result"></p>

</div>

<script>

function parseCron(){

let cron=document.getElementById("cron").value.trim()

let parts=cron.split(" ")

if(parts.length!==5){

document.getElementById("result").innerText="Invalid cron format"

return

}

let [min,hour,day,month,week]=parts

function explain(v,type){

if(v==="*") return "every "+type

if(v.startsWith("*/")) return "every "+v.substring(2)+" "+type

return type+" "+v

}

let text="Runs "

text+=explain(min,"minute")+", "
text+=explain(hour,"hour")+", "
text+=explain(day,"day")+", "
text+=explain(month,"month")+", "
text+=explain(week,"weekday")

document.getElementById("result").innerText=text

}

</script>

</body>

</html>

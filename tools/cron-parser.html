<body>

<main class="container">

<h1>Cron Expression Parser</h1>

<p class="subtitle">Paste a cron expression and see a human-readable explanation of when it runs.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<label for="cron" class="sr-only">Cron</label>
<input id="cron" style="width:320px" placeholder="Example: */5 * * * *" aria-label="Cron">

<br><br>

<button onclick="parseCron()">Parse</button>

<h3>Result</h3>

<p id="result"></p>

</main>

<script>

function parseCron(){

let cron=document.getElementById("cron").value.trim()

let parts=cron.split(" ")

if(parts.length!==5){

document.getElementById("result").innerText="Invalid cron format"

return

}

let [min,hour,day,month,week]=parts

function explain(v,type){

if(v==="*") return "every "+type

if(v.startsWith("*/")) return "every "+v.substring(2)+" "+type

return type+" "+v

}

let text="Runs "

text+=explain(min,"minute")+", "
text+=explain(hour,"hour")+", "
text+=explain(day,"day")+", "
text+=explain(month,"month")+", "
text+=explain(week,"weekday")

document.getElementById("result").innerText=text

}

</script>

</body>

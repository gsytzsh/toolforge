<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main class="container">
<h1>Whitespace Remover</h1>
<p class="subtitle">Remove extra spaces, trim lines, or collapse all whitespace to single spaces.</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>Input</h3>
<label for="input" class="sr-only">Input text</label>
<textarea id="input" rows="8" style="width:90%" aria-label="Input text"></textarea>
<br><br>
<button onclick="collapse()">Collapse spaces</button>
<button onclick="trimLines()">Trim each line</button>
<button onclick="removeAll()">Remove all spaces</button>
<h3>Result</h3>
<label for="output" class="sr-only">Output text</label>
<textarea id="output" rows="8" style="width:90%" aria-label="Output text"></textarea>
</main>
<script>
function collapse(){document.getElementById("output").value=document.getElementById("input").value.replace(/\s+/g," ").trim()}
function trimLines(){document.getElementById("output").value=document.getElementById("input").value.split(/\r?\n/).map(function(l){return l.trim()}).join("\n")}
function removeAll(){document.getElementById("output").value=document.getElementById("input").value.replace(/\s+/g,"")}
</script>
</body>
</html>

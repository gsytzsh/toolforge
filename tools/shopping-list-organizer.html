<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shopping List Organizer - Group Shopping Items | ToolForge</title>
<meta name="description" content="Free online Shopping List Organizer to sort shopping items into simple categories and save the list in your browser.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="canonical" href="https://www.toolforge.site/tools/shopping-list-organizer.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="ToolForge">
<meta property="og:title" content="Shopping List Organizer - Group Shopping Items | ToolForge">
<meta property="og:description" content="Free online Shopping List Organizer to sort shopping items into simple categories and save the list in your browser.">
<meta property="og:url" content="https://www.toolforge.site/tools/shopping-list-organizer.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Shopping List Organizer - Group Shopping Items | ToolForge">
<meta name="twitter:description" content="Free online Shopping List Organizer to sort shopping items into simple categories and save the list in your browser.">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main class="container">
<h1>Shopping List Organizer</h1>
<p class="subtitle">Group shopping items by category using lines like <code>Produce|Apples</code>.</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<label for="items" class="sr-only">Shopping items</label>
<textarea id="items" rows="12" class="pdf-editor" aria-label="Shopping items" placeholder="Produce|Apples&#10;Produce|Bananas&#10;Dairy|Milk&#10;Household|Soap"></textarea>
<div class="tool-actions">
<button type="button" onclick="organizeList()">Organize</button>
<button type="button" onclick="saveList()">Save</button>
<button type="button" onclick="copyList()">Copy Organized List</button>
</div>
<pre id="result"></pre>
<p id="status" class="inline-status"></p>
</main>
<script>
const KEY="toolforge.shopping-list-organizer"
function buildOutput(){
let groups={}
document.getElementById("items").value.split(/\r?\n/).map(function(line){return line.trim()}).filter(Boolean).forEach(function(line){
let parts=line.split("|")
let group=parts.length>1?(parts[0]||"Other").trim():"Other"
let item=(parts.length>1?parts.slice(1).join("|"):parts[0]||"").trim()
if(!groups[group]) groups[group]=[]
groups[group].push(item)
})
let blocks=Object.keys(groups).map(function(group){
return group+"\n- "+groups[group].join("\n- ")
})
return blocks.join("\n\n")
}
function organizeList(){
let output=buildOutput()
document.getElementById("result").innerText=output||"No items yet."
document.getElementById("status").innerText="Shopping list organized."
document.getElementById("status").style.color="#16a34a"
}
function saveList(){
try{
localStorage.setItem(KEY,document.getElementById("items").value)
document.getElementById("status").innerText="Shopping list saved."
document.getElementById("status").style.color="#16a34a"
}catch(e){
document.getElementById("status").innerText="Save failed."
document.getElementById("status").style.color="#b91c1c"
}
}
function copyList(){
let value=document.getElementById("result").innerText.trim()
if(!value){
document.getElementById("status").innerText="Nothing to copy."
document.getElementById("status").style.color="#b91c1c"
return
}
navigator.clipboard.writeText(value).then(function(){
document.getElementById("status").innerText="Organized list copied."
document.getElementById("status").style.color="#16a34a"
}).catch(function(){
document.getElementById("status").innerText="Copy failed."
document.getElementById("status").style.color="#b91c1c"
})
}
try{
let saved=localStorage.getItem(KEY)
if(saved) document.getElementById("items").value=saved
}catch(e){}
</script>
</body>
</html>

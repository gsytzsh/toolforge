<html lang="en">

<meta charset="UTF-8">

</head>

<body>

<main class="container">

<h1>JSON Minify</h1>

<p class="subtitle">Remove whitespace from JSON to create compact payloads for APIs and storage.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<h3>Input JSON</h3>
<label for="input" class="sr-only">Input text</label>
<textarea id="input" rows="10" style="width:90%" placeholder='{"foo": "bar"}' aria-label="Input text"></textarea>

<br><br>

<div class="tool-actions">
<button onclick="minify()">Minify</button>
<button type="button" onclick="copyOutput()">Copy Result</button>
</div>

<h3 style="margin-top:24px">Minified JSON</h3>
<label for="output" class="sr-only">Output text</label>
<textarea id="output" rows="10" style="width:90%" aria-label="Output text"></textarea>

<p id="status" style="color:#666;margin-top:8px">Ready.</p>

</main>

<script>

function minify(){
let v=document.getElementById("input").value
try{
let obj=JSON.parse(v)
let out=JSON.stringify(obj)
document.getElementById("output").value=out
document.getElementById("status").innerText="OK."
document.getElementById("status").style.color="#16a34a"
}catch(e){
document.getElementById("status").innerText="Invalid JSON: "+e.message
document.getElementById("status").style.color="#b91c1c"
}
}

function copyOutput(){
let value=document.getElementById("output").value
if(!value){
document.getElementById("status").innerText="Nothing to copy."
document.getElementById("status").style.color="#b91c1c"
return
}
navigator.clipboard.writeText(value).then(function(){
document.getElementById("status").innerText="Result copied."
document.getElementById("status").style.color="#16a34a"
}).catch(function(){
document.getElementById("status").innerText="Copy failed."
document.getElementById("status").style.color="#b91c1c"
})
}

</script>

</body>
</html>

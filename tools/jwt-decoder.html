<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>JWT Decoder – Decode JSON Web Tokens Online | ToolForge</title>

<meta name="description" content="Free online JWT Decoder to inspect JSON Web Token headers and payloads in your browser. Useful for debugging authentication and APIs. Part of the ToolForge developer tools collection.">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container">

<h1>JWT Decoder</h1>

<p class="subtitle">Decode JSON Web Tokens (JWT) to inspect headers and payloads for authentication and API debugging.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<textarea id="token" rows="6" style="width:90%" placeholder="Paste JWT token here"></textarea>

<br><br>

<button onclick="decode()">Decode JWT</button>

<h3>Header</h3>

<pre id="header"></pre>

<h3>Payload</h3>

<pre id="payload"></pre>

</div>

<script>

function decode(){

let token=document.getElementById("token").value.trim()

let parts=token.split(".")

if(parts.length<2){

alert("Invalid JWT")

return

}

try{

let header=JSON.parse(atob(parts[0]))

let payload=JSON.parse(atob(parts[1]))

document.getElementById("header").innerText=
JSON.stringify(header,null,2)

document.getElementById("payload").innerText=
JSON.stringify(payload,null,2)

}catch(e){

alert("Decode failed")

}

}

</script>

</body>

</html>

<body>

<main class="container">

<h1>JWT Decoder</h1>

<p class="subtitle">Decode JSON Web Tokens (JWT) to inspect headers and payloads for authentication and API debugging.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<textarea id="token" rows="6" style="width:90%" placeholder="Paste JWT token here" aria-label="Token"></textarea>

<br><br>

<div class="tool-actions">
<button onclick="decode()">Decode JWT</button>
<button type="button" onclick="copyDecoded()">Copy Decoded JSON</button>
</div>

<h3>Header</h3>

<pre id="header"></pre>

<h3>Payload</h3>

<pre id="payload"></pre>

<p id="status" style="color:#666"></p>

</main>

<script>

function decodeBase64Url(segment){
let normalized=segment.replace(/-/g,"+").replace(/_/g,"/")
while(normalized.length%4!==0) normalized+="="
let binary=atob(normalized)
let bytes=new Uint8Array(binary.length)
for(let i=0;i<binary.length;i++){
bytes[i]=binary.charCodeAt(i)
}
return new TextDecoder().decode(bytes)
}

function decode(){

let token=document.getElementById("token").value.trim()

let parts=token.split(".")

if(parts.length<2){

document.getElementById("header").innerText=""
document.getElementById("payload").innerText=""
document.getElementById("status").innerText="Invalid JWT format."
document.getElementById("status").style.color="#b91c1c"

return

}

try{

let header=JSON.parse(decodeBase64Url(parts[0]))

let payload=JSON.parse(decodeBase64Url(parts[1]))

document.getElementById("header").innerText=
JSON.stringify(header,null,2)

document.getElementById("payload").innerText=
JSON.stringify(payload,null,2)

document.getElementById("status").innerText="Decoded successfully."
document.getElementById("status").style.color="#16a34a"

}catch(e){

document.getElementById("header").innerText=""
document.getElementById("payload").innerText=""
document.getElementById("status").innerText="Decode failed. Make sure the JWT is valid base64url JSON."
document.getElementById("status").style.color="#b91c1c"

}

}

function copyDecoded(){
let header=document.getElementById("header").innerText.trim()
let payload=document.getElementById("payload").innerText.trim()
if(!header&&!payload){
document.getElementById("status").innerText="Nothing to copy."
document.getElementById("status").style.color="#b91c1c"
return
}
let text=["Header:",header,"","Payload:",payload].join("\n")
navigator.clipboard.writeText(text).then(function(){
document.getElementById("status").innerText="Decoded content copied."
document.getElementById("status").style.color="#16a34a"
}).catch(function(){
document.getElementById("status").innerText="Copy failed."
document.getElementById("status").style.color="#b91c1c"
})
}

</script>

</body>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Base64 Image Viewer – Preview Base64 Images Online | ToolForge</title>

<meta name="description" content="Free online Base64 Image Viewer to preview images from Base64 strings or data URLs in your browser. Part of the ToolForge developer tools collection.">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container">

<h1>Base64 Image Viewer</h1>

<p class="subtitle">Paste a Base64 image string or data URL and preview the image instantly.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<textarea id="input" rows="8" style="width:90%" placeholder="Paste Base64 image string here"></textarea>

<br><br>

<button onclick="renderImage()">Preview Image</button>
<button onclick="clearAll()">Clear</button>

<h3>Image Preview</h3>

<div id="preview"></div>

</div>

<script>

function renderImage(){

let base64=document.getElementById("input").value.trim()

let preview=document.getElementById("preview")

preview.innerHTML=""

if(!base64){

preview.innerText="No Base64 data"

return

}

if(!base64.startsWith("data:image")){

base64="data:image/png;base64,"+base64

}

let img=document.createElement("img")

img.src=base64
img.style.maxWidth="100%"
img.style.border="1px solid #ddd"

preview.appendChild(img)

}

function clearAll(){

document.getElementById("input").value=""
document.getElementById("preview").innerHTML=""

}

</script>

</body>

</html>

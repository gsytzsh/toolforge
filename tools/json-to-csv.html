<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>JSON to CSV Converter – Convert JSON Arrays Online | ToolForge</title>
<meta name="description" content="Free online JSON to CSV Converter to turn JSON arrays into CSV format for spreadsheets, imports and reports. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container">

<h1>JSON to CSV Converter</h1>

<p class="subtitle">Convert JSON arrays into CSV files for spreadsheets, imports, analytics and reporting.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<textarea id="json" rows="10" style="width:90%" placeholder='[{"name":"Tom","age":20},{"name":"Alice","age":25}]'></textarea>

<br><br>

<button onclick="convert()">Convert</button>

<h3>CSV Result</h3>

<textarea id="csv" rows="10" style="width:90%"></textarea>

<p id="status" style="color:#666"></p>

</div>

<script>

function escapeCsv(value){
if(value===null||value===undefined) return ""
let text=String(value)
if(/[",\n\r]/.test(text)){
return '"' + text.replace(/"/g,'""') + '"'
}
return text
}

function convert(){

let jsonText=document.getElementById("json").value

try{

let data=JSON.parse(jsonText)

if(!Array.isArray(data)||!data.length){
document.getElementById("csv").value=""
document.getElementById("status").innerText="JSON must be a non-empty array."
document.getElementById("status").style.color="#b91c1c"
return
}

let keys=Object.keys(data[0])

let csv=keys.map(escapeCsv).join(",")+"\n"

data.forEach(row=>{
csv+=keys.map(function(k){ return escapeCsv(row[k]); }).join(",")+"\n"
})

document.getElementById("csv").value=csv
document.getElementById("status").innerText="Converted successfully."
document.getElementById("status").style.color="#16a34a"

}catch(e){
document.getElementById("csv").value=""
document.getElementById("status").innerText="Invalid JSON input."
document.getElementById("status").style.color="#b91c1c"
}

}

</script>

</body>
</html>

<meta charset="UTF-8">

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<main class="container">

<h1>JSON to CSV Converter</h1>

<p class="subtitle">Convert JSON arrays into CSV files for spreadsheets, imports, analytics and reporting.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<label for="json" class="sr-only">JSON input</label>
<textarea id="json" rows="10" style="width:90%" placeholder='[{"name":"Tom","age":20},{"name":"Alice","age":25}]' aria-label="JSON input"></textarea>

<br><br>

<div class="tool-actions">
<button onclick="convert()">Convert</button>
<button type="button" onclick="copyOutput()">Copy Result</button>
</div>

<h3>CSV Result</h3>

<label for="csv" class="sr-only">CSV input</label>
<textarea id="csv" rows="10" style="width:90%" aria-label="CSV input"></textarea>

<p id="status" style="color:#666"></p>

</main>

<script>

function escapeCsv(value){
if(value===null||value===undefined) return ""
let text=String(value)
if(/[",\n\r]/.test(text)){
return '"' + text.replace(/"/g,'""') + '"'
}
return text
}

function convert(){

let jsonText=document.getElementById("json").value

try{

let data=JSON.parse(jsonText)

if(!Array.isArray(data)||!data.length){
document.getElementById("csv").value=""
document.getElementById("status").innerText="JSON must be a non-empty array."
document.getElementById("status").style.color="#b91c1c"
return
}

let keys=Object.keys(data[0])

let csv=keys.map(escapeCsv).join(",")+"\n"

data.forEach(row=>{
csv+=keys.map(function(k){ return escapeCsv(row[k]); }).join(",")+"\n"
})

document.getElementById("csv").value=csv
document.getElementById("status").innerText="Converted successfully."
document.getElementById("status").style.color="#16a34a"

}catch(e){
document.getElementById("csv").value=""
document.getElementById("status").innerText="Invalid JSON input."
document.getElementById("status").style.color="#b91c1c"
}

}

function copyOutput(){
let value=document.getElementById("csv").value
if(!value){
document.getElementById("status").innerText="Nothing to copy."
document.getElementById("status").style.color="#b91c1c"
return
}
navigator.clipboard.writeText(value).then(function(){
document.getElementById("status").innerText="Result copied."
document.getElementById("status").style.color="#16a34a"
}).catch(function(){
document.getElementById("status").innerText="Copy failed."
document.getElementById("status").style.color="#b91c1c"
})
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<meta name="description" content="Free online XML to JSON converter. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta property="og:description" content="Free online XML to JSON converter. Part of the ToolForge developer tools collection.">
<meta property="og:url" content="https://www.toolforge.site/tools/xml-to-json.html">
<meta name="twitter:card" content="summary">

<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main class="container">
<h1>XML to JSON</h1>
<p class="subtitle">Paste simple XML to convert to JSON (browser parser).</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>XML</h3>
<textarea id="xml" rows="10" style="width:90%" placeholder='<root><name>Tom</name><age>20</age></root>' aria-label="XML input"></textarea>
<br><br>
<div class="tool-actions">
<button onclick="convert()">Convert to JSON</button>
<button type="button" onclick="copyOutput()">Copy Result</button>
</div>
<h3>JSON</h3>
<textarea id="json" rows="10" style="width:90%" aria-label="JSON input"></textarea>
<p id="status" style="color:#666"></p>
</main>
<script>
function parseXmlToJson(node){
if(node.nodeType!==1) return null

var obj={}
if(node.attributes.length){
obj["@attributes"]={}
for(var i=0;i<node.attributes.length;i++){
obj["@attributes"][node.attributes[i].name]=node.attributes[i].value
}
}

var elementChildren=Array.from(node.childNodes).filter(function(child){
return child.nodeType===1
})
var textChildren=Array.from(node.childNodes).filter(function(child){
return child.nodeType===3 && child.textContent.trim()
})

if(!elementChildren.length){
if(textChildren.length && !node.attributes.length){
return textChildren.map(function(child){ return child.textContent.trim() }).join(" ")
}
if(textChildren.length){
obj["#text"]=textChildren.map(function(child){ return child.textContent.trim() }).join(" ")
}
return obj
}

elementChildren.forEach(function(child){
var name=child.tagName
var val=parseXmlToJson(child)
if(obj[name]===undefined)obj[name]=val
else if(Array.isArray(obj[name]))obj[name].push(val)
else obj[name]=[obj[name],val]
})

if(textChildren.length){
obj["#text"]=textChildren.map(function(child){ return child.textContent.trim() }).join(" ")
}

return obj
}
function convert(){
try{
var parser=new DOMParser()
var doc=parser.parseFromString(document.getElementById("xml").value,"text/xml")
if(doc.querySelector("parsererror")){document.getElementById("status").innerText="XML parse error.";document.getElementById("status").style.color="#b91c1c";return}
var root=doc.documentElement
var out={}
if(root.tagName){out[root.tagName]=parseXmlToJson(root)}
document.getElementById("json").value=JSON.stringify(out,null,2)
document.getElementById("status").innerText="OK."
document.getElementById("status").style.color="#16a34a"
}catch(e){document.getElementById("status").innerText="Error: "+e.message;document.getElementById("status").style.color="#b91c1c"}
}

function copyOutput(){
var value=document.getElementById("json").value
if(!value){
document.getElementById("status").innerText="Nothing to copy."
document.getElementById("status").style.color="#b91c1c"
return
}
navigator.clipboard.writeText(value).then(function(){
document.getElementById("status").innerText="Result copied."
document.getElementById("status").style.color="#16a34a"
}).catch(function(){
document.getElementById("status").innerText="Copy failed."
document.getElementById("status").style.color="#b91c1c"
})
}
</script>
</body>
</html>

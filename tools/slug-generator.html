<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Slug Generator – Create URL Slugs from Titles | ToolForge</title>
<meta name="description" content="Free online Slug Generator to turn titles into URL-friendly slugs for blogs, CMS and SEO. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container">

<h1>Slug Generator</h1>

<p class="subtitle">Turn a title into a clean, URL-friendly slug for blog posts, pages and products.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<h3>Title</h3>
<input id="title" style="width:80%" placeholder="My Awesome Blog Post!">

<br><br>

<button onclick="makeSlug()">Generate Slug</button>

<h3 style="margin-top:24px">Slug</h3>
<input id="slug" style="width:80%" readonly>

</div>

<script>

function makeSlug(){

let text=document.getElementById("title").value

let slug=text
.toLowerCase()
.normalize("NFKD").replace(/[\u0300-\u036f]/g,"")
.replace(/[^a-z0-9]+/g,"-")
.replace(/^-+|-+$/g,"")

document.getElementById("slug").value=slug

}

</script>

</body>
</html>

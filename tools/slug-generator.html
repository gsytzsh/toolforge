<meta charset="UTF-8">

<meta name="twitter:card" content="summary">

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<main class="container">

<h1>Slug Generator</h1>

<p class="subtitle">Turn a title into a clean, URL-friendly slug for blog posts, pages and products.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<h3>Title</h3>
<label for="title" class="sr-only">Title</label>
<input id="title" style="width:80%" placeholder="My Awesome Blog Post!" aria-label="Title">

<br><br>

<div class="tool-actions">
<button onclick="makeSlug()">Generate Slug</button>
<button type="button" onclick="copySlug()">Copy Slug</button>
</div>

<h3 style="margin-top:24px">Slug</h3>
<label for="slug" class="sr-only">Slug</label>
<input id="slug" style="width:80%" readonly aria-label="Slug">
<p id="status" class="inline-status"></p>

</main>

<script>

function makeSlug(){

let text=document.getElementById("title").value

let slug=text
.toLowerCase()
.normalize("NFKD").replace(/[\u0300-\u036f]/g,"")
.replace(/[^a-z0-9]+/g,"-")
.replace(/^-+|-+$/g,"")

document.getElementById("slug").value=slug
document.getElementById("status").innerText="Slug generated."
document.getElementById("status").style.color="#16a34a"

}

function copySlug(){
let value=document.getElementById("slug").value
if(!value){
document.getElementById("status").innerText="Nothing to copy."
document.getElementById("status").style.color="#b91c1c"
return
}
navigator.clipboard.writeText(value).then(function(){
document.getElementById("status").innerText="Slug copied."
document.getElementById("status").style.color="#16a34a"
}).catch(function(){
document.getElementById("status").innerText="Copy failed."
document.getElementById("status").style.color="#b91c1c"
})
}

</script>

</body>
</html>

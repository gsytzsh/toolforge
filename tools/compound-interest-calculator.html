<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Compound Interest Calculator – Calculate Compound Interest | ToolForge</title>
<meta name="description" content="Free online Compound Interest Calculator. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
<h1>Compound Interest Calculator</h1>
<p class="subtitle">Calculate final amount from principal, annual rate, and time in years (compound interest).</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>Principal</h3>
<input id="principal" type="number" placeholder="1000" style="width:140px">
<h3>Annual rate %</h3>
<input id="rate" type="number" step="0.01" placeholder="5" style="width:80px">
<h3>Years</h3>
<input id="years" type="number" step="0.1" placeholder="10" style="width:80px">
<br><br>
<button onclick="calc()">Calculate</button>
<h3>Result</h3>
<p>Final amount: <span id="result"></span></p>
<p>Interest earned: <span id="interest"></span></p>
</div>
<script>
function calc(){
var P=parseFloat(document.getElementById("principal").value)
var r=parseFloat(document.getElementById("rate").value)/100
var t=parseFloat(document.getElementById("years").value)
if(!P||P<0||!t){document.getElementById("result").innerText="";document.getElementById("interest").innerText="Enter valid values.";return}
var A=P*Math.pow(1+r,t)
document.getElementById("result").innerText=A.toFixed(2)
document.getElementById("interest").innerText=(A-P).toFixed(2)
}
</script>
</body>
</html>

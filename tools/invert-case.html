<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invert Case – Swap Uppercase and Lowercase | ToolForge</title>
<meta name="description" content="Free online Invert Case tool to swap uppercase and lowercase letters. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
<h1>Invert Case</h1>
<p class="subtitle">Swap uppercase and lowercase: Hello → hELLO.</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>Input</h3>
<textarea id="input" rows="6" style="width:90%"></textarea>
<br><br>
<button onclick="invert()">Invert Case</button>
<h3>Result</h3>
<textarea id="output" rows="6" style="width:90%"></textarea>
</div>
<script>
function invert(){
var s=document.getElementById("input").value
document.getElementById("output").value=s.split("").map(function(c){var u=c.toUpperCase();return c===u?c.toLowerCase():u}).join("")
}
</script>
</body>
</html>

<body>
<main class="container">
<h1>Invert Case</h1>
<p class="subtitle">Swap uppercase and lowercase: Hello → hELLO.</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>Input</h3>
<textarea id="input" rows="6" style="width:90%" aria-label="Input"></textarea>
<br><br>
<button onclick="invert()">Invert Case</button>
<h3>Result</h3>
<textarea id="output" rows="6" style="width:90%" aria-label="Output"></textarea>
</main>
<script>
function invert(){
var s=document.getElementById("input").value
document.getElementById("output").value=s.split("").map(function(c){var u=c.toUpperCase();return c===u?c.toLowerCase():u}).join("")
}
</script>
</body>

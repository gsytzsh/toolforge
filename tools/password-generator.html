<meta charset="UTF-8">
<title>Password Generator - Free Online Tool</title>
<meta name="description" content="Password Generator free online tool">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">

<body>

<div class="container">

<h1>Password Generator</h1>

<button type="button" onclick="generate()">Generate Password</button>

<h2 id="password"></h2>

</div>

<script>

function generate(){

let chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%"

let pass=""

for(let i=0;i<12;i++){

pass+=chars[Math.floor(Math.random()*chars.length)]

}

document.getElementById("password").innerText=pass

}

</script>

<body>

<div class="container">

<h1>Password Generator</h1>

<p class="subtitle">Generate strong random passwords for accounts, apps and infrastructure secrets.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<button type="button" onclick="generate()">Generate Password</button>

<h2 id="password"></h2>

</div>

<script>

function generate(){

let chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%"

let pass=""

for(let i=0;i<12;i++){

pass+=chars[Math.floor(Math.random()*chars.length)]

}

document.getElementById("password").innerText=pass

}

</script>

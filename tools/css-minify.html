<body>
<main class="container">
<h1>CSS Minify</h1>
<p class="subtitle">Remove comments and collapse whitespace to minify CSS.</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>CSS</h3>
<label for="input" class="sr-only">Input text</label>
<textarea id="input" rows="12" style="width:90%;font-family:monospace" placeholder="/* comment */&#10;.foo { color: red; }" aria-label="Input text"></textarea>
<br><br>
<button onclick="minify()">Minify</button>
<h3>Minified</h3>
<label for="output" class="sr-only">Output text</label>
<textarea id="output" rows="8" style="width:90%;font-family:monospace" readonly aria-label="Output text"></textarea>
</main>
<script>
function minify(){
var s=document.getElementById("input").value
s=s.replace(/\/\*[\s\S]*?\*\//g,"")
s=s.replace(/\s+/g," ").replace(/\s*([{}:;,])\s*/g,"$1").trim()
document.getElementById("output").value=s
}
</script>
</body>

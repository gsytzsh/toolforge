<body>

<main class="container">

<h1>JWT Generator</h1>

<p class="subtitle">Create JSON Web Tokens (JWT) from header, payload and secret for testing authentication and APIs.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<h3>Header</h3>

<textarea id="header" rows="5" style="width:90%" aria-label="Header">
{
 "alg": "HS256",
 "typ": "JWT"
}
</textarea>

<h3>Payload</h3>

<textarea id="payload" rows="6" style="width:90%" aria-label="Payload">
{
 "user": "admin",
 "role": "test"
}
</textarea>

<h3>Secret</h3>

<input id="secret" style="width:300px" placeholder="secret key" aria-label="Secret">

<br><br>

<button onclick="generate()">Generate</button>

<h3>JWT Token</h3>

<textarea id="token" rows="4" style="width:90%" aria-label="Token"></textarea>

<p id="status" style="color:#666"></p>

</main>

<script>

function utf8ToBase64(source){
let bytes=new TextEncoder().encode(source)
let binary=""
bytes.forEach(function(byte){
binary+=String.fromCharCode(byte)
})
return btoa(binary)
}

function base64url(source){

let encoded=utf8ToBase64(source)

return encoded.replace(/=/g,"")
.replace(/\+/g,"-")
.replace(/\//g,"_")

}

async function generate(){

let header=document.getElementById("header").value
let payload=document.getElementById("payload").value
let secret=document.getElementById("secret").value

try{
JSON.parse(header)
JSON.parse(payload)
}catch(e){
document.getElementById("token").value=""
document.getElementById("status").innerText="Header and payload must be valid JSON."
document.getElementById("status").style.color="#b91c1c"
return
}

let header64=base64url(header)
let payload64=base64url(payload)

let data=header64+"."+payload64

const enc=new TextEncoder()

let key=await crypto.subtle.importKey(
"raw",
enc.encode(secret),
{name:"HMAC",hash:"SHA-256"},
false,
["sign"]
)

let sig=await crypto.subtle.sign(
"HMAC",
key,
enc.encode(data)
)

let signature=btoa(
String.fromCharCode(...new Uint8Array(sig))
)
.replace(/=/g,"")
.replace(/\+/g,"-")
.replace(/\//g,"_")

let token=data+"."+signature

document.getElementById("token").value=token
document.getElementById("status").innerText="Token generated successfully."
document.getElementById("status").style.color="#16a34a"

}

</script>

</body>

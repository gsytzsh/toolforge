<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grade Calculator – Final Grade Needed Calculator | ToolForge</title>
<meta name="description" content="Free online Grade Calculator: what grade you need on the final to get a target grade. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
<h1>Grade Calculator</h1>
<p class="subtitle">Calculate the grade you need on the final exam to reach a target course grade.</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>Current grade %</h3>
<input id="current" type="number" step="0.1" placeholder="80" style="width:100px">
<h3>Weight of final %</h3>
<input id="weight" type="number" step="0.1" placeholder="30" style="width:100px">
<h3>Target course grade %</h3>
<input id="target" type="number" step="0.1" placeholder="85" style="width:100px">
<br><br>
<button onclick="calc()">Calculate</button>
<h3>Result</h3>
<p>Grade needed on final: <span id="result"></span></p>
</div>
<script>
function calc(){
var cur=parseFloat(document.getElementById("current").value)
var w=parseFloat(document.getElementById("weight").value)/100
var t=parseFloat(document.getElementById("target").value)
if(isNaN(cur)||isNaN(w)||isNaN(t)||w<=0||w>1){document.getElementById("result").innerText="Enter valid values.";return}
var need=(t-(1-w)*cur)/w
if(need<0||need>100)document.getElementById("result").innerText=need.toFixed(1)+"% (outside 0–100)"
else document.getElementById("result").innerText=need.toFixed(1)+"%"
}
</script>
</body>
</html>

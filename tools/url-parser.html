<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>URL Parser – Parse URLs into Components | ToolForge</title>
<meta name="description" content="Free online URL Parser to split a URL into protocol, host, path and query parameters. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="canonical" href="https://www.toolforge.site/tools/url-parser.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="ToolForge">
<meta property="og:title" content="URL Parser – Parse URLs into Components | ToolForge">
<meta property="og:description" content="Free online URL Parser to split a URL into protocol, host, path and query parameters. Part of the ToolForge developer tools collection.">
<meta property="og:url" content="https://www.toolforge.site/tools/url-parser.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="URL Parser – Parse URLs into Components | ToolForge">
<meta name="twitter:description" content="Free online URL Parser to split a URL into protocol, host, path and query parameters. Part of the ToolForge developer tools collection.">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<main class="container">

<h1>URL Parser</h1>

<p class="subtitle">Parse a URL into protocol, host, path and query parameters for debugging and development.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<h3>Input URL</h3>
<label for="url" class="sr-only">Url</label>
<input id="url" style="width:80%" placeholder="https://example.com/path?foo=1&bar=2" aria-label="Url">

<br><br>

<div class="tool-actions">
<button onclick="parseUrl()">Parse</button>
<button type="button" onclick="copyResult()">Copy Result</button>
</div>

<h3 style="margin-top:24px">Components</h3>
<pre id="components"></pre>

<h3>Query Parameters</h3>
<pre id="params"></pre>
<p id="status" class="inline-status"></p>

</main>

<script>

function parseUrl(){

let input=document.getElementById("url").value.trim()

if(!input){
document.getElementById("components").innerText="Enter URL"
document.getElementById("params").innerText=""
document.getElementById("status").innerText="Enter a URL to parse."
document.getElementById("status").style.color="#b91c1c"
return
}

try{

let u=new URL(input)

let comp={
href:u.href,
protocol:u.protocol,
host:u.host,
hostname:u.hostname,
port:u.port||"(default)",
pathname:u.pathname,
hash:u.hash||"(none)"
}

document.getElementById("components").innerText=
JSON.stringify(comp,null,2)

let paramsObj={}
u.searchParams.forEach((v,k)=>{
if(paramsObj[k]===undefined) paramsObj[k]=v
else if(Array.isArray(paramsObj[k])) paramsObj[k].push(v)
else paramsObj[k]=[paramsObj[k],v]
})

if(Object.keys(paramsObj).length===0){
document.getElementById("params").innerText="(no query parameters)"
}else{
document.getElementById("params").innerText=
JSON.stringify(paramsObj,null,2)
}
document.getElementById("status").innerText="Parsed successfully."
document.getElementById("status").style.color="#16a34a"

}catch(e){
document.getElementById("components").innerText="Invalid URL"
document.getElementById("params").innerText=""
document.getElementById("status").innerText="Invalid URL."
document.getElementById("status").style.color="#b91c1c"
}

}

function copyResult(){
let components=document.getElementById("components").innerText.trim()
let params=document.getElementById("params").innerText.trim()
if(!components && !params){
document.getElementById("status").innerText="Nothing to copy."
document.getElementById("status").style.color="#b91c1c"
return
}
let text=["Components:",components,"","Query Parameters:",params].join("\n")
navigator.clipboard.writeText(text).then(function(){
document.getElementById("status").innerText="Parsed result copied."
document.getElementById("status").style.color="#16a34a"
}).catch(function(){
document.getElementById("status").innerText="Copy failed."
document.getElementById("status").style.color="#b91c1c"
})
}

</script>

</body>
</html>

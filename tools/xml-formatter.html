</head>
<body>
<main class="container">
<h1>XML Formatter</h1>
<p class="subtitle">Paste XML to format with indentation for readability.</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>XML</h3>
<textarea id="input" rows="12" style="width:90%;font-family:monospace" placeholder="<root><a>1</a><b>2</b></root>" aria-label="XML input"></textarea>
<br><br>
<button onclick="format()">Format</button>
<h3>Formatted</h3>
<textarea id="output" rows="12" style="width:90%;font-family:monospace" readonly aria-label="Output"></textarea>
<p id="err" style="color:#b91c1c"></p>
</main>
<script>
function format(){
var s=document.getElementById("input").value.trim()
document.getElementById("err").innerText=""
try{
var parser=new DOMParser()
var doc=parser.parseFromString(s,"text/xml")
if(doc.querySelector("parsererror")){document.getElementById("err").innerText="Invalid XML.";return}
var serialized=new XMLSerializer().serializeToString(doc)
var lines=serialized.replace(/(>)(<)(\/?)/g,"$1\n$2$3").split("\n")
var formatted=""
var indent=0
for(var i=0;i<lines.length;i++){
var line=lines[i].trim()
if(!line) continue
if(/^<\//.test(line)) indent=Math.max(indent-1,0)
formatted+="  ".repeat(indent)+line+"\n"
if(/^<[^!?/][^>]*[^/]>$/.test(line)) indent++
}
document.getElementById("output").value=formatted.trim()
}catch(e){document.getElementById("err").innerText=e.message}
}
</script>
</body>
</html>

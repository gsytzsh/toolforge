<body>

<main class="container">

<h1>Percentage Calculator</h1>

<p class="subtitle">Quickly compute common percentage problems for pricing, discounts, analytics and finance.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<h3>1. What is X% of Y?</h3>

<p>
<label for="p1_x" class="sr-only">P1 X</label>
<input id="p1_x" type="number" style="width:120px" placeholder="X" aria-label="P1 X"> %
of
<label for="p1_y" class="sr-only">P1 Y</label>
<input id="p1_y" type="number" style="width:160px" placeholder="Y" aria-label="P1 Y">
</p>

<button onclick="calcP1()">Calculate</button>

<p><b>Result:</b> <span id="p1_result"></span></p>

<hr>

<h3>2. X is what percent of Y?</h3>

<p>
<label for="p2_x" class="sr-only">P2 X</label>
<input id="p2_x" type="number" style="width:160px" placeholder="X" aria-label="P2 X">
is what % of
<label for="p2_y" class="sr-only">P2 Y</label>
<input id="p2_y" type="number" style="width:160px" placeholder="Y" aria-label="P2 Y">
</p>

<button onclick="calcP2()">Calculate</button>

<p><b>Result:</b> <span id="p2_result"></span></p>

<hr>

<h3>3. Percentage change from A to B</h3>

<p>
From
<label for="p3_a" class="sr-only">P3 A</label>
<input id="p3_a" type="number" style="width:160px" placeholder="A" aria-label="P3 A">
to
<label for="p3_b" class="sr-only">P3 B</label>
<input id="p3_b" type="number" style="width:160px" placeholder="B" aria-label="P3 B">
</p>

<button onclick="calcP3()">Calculate</button>

<p><b>Result:</b> <span id="p3_result"></span></p>

</main>

<script>

function formatNumber(n){
if(!isFinite(n)) return ""
return Number(n.toFixed(4)).toString()
}

function calcP1(){
let x=parseFloat(document.getElementById("p1_x").value)
let y=parseFloat(document.getElementById("p1_y").value)

if(isNaN(x)||isNaN(y)){
document.getElementById("p1_result").innerText="Please enter both numbers."
return
}

let result=y*x/100
document.getElementById("p1_result").innerText=formatNumber(result)
}

function calcP2(){
let x=parseFloat(document.getElementById("p2_x").value)
let y=parseFloat(document.getElementById("p2_y").value)

if(isNaN(x)||isNaN(y)){
document.getElementById("p2_result").innerText="Please enter both numbers."
return
}

if(y===0){
document.getElementById("p2_result").innerText="Cannot divide by zero."
return
}

let result=x/y*100
document.getElementById("p2_result").innerText=formatNumber(result)+" %"
}

function calcP3(){
let a=parseFloat(document.getElementById("p3_a").value)
let b=parseFloat(document.getElementById("p3_b").value)

if(isNaN(a)||isNaN(b)){
document.getElementById("p3_result").innerText="Please enter both numbers."
return
}

if(a===0){
document.getElementById("p3_result").innerText="Cannot compute change from zero."
return
}

let diff=b-a
let percent=diff/a*100
let sign=percent>0?"+":""

document.getElementById("p3_result").innerText=sign+formatNumber(percent)+" %"
}

</script>

</body>

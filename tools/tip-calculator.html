<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tip Calculator – Calculate Tip and Split Bill | ToolForge</title>
<meta name="description" content="Free online Tip Calculator to compute tip amount and split the bill. Part of the ToolForge developer tools collection.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
<h1>Tip Calculator</h1>
<p class="subtitle">Enter bill amount and tip percentage to get tip and total. Optionally split by number of people.</p>
<p><a href="/">Back to all tools on ToolForge</a></p>
<h3>Bill amount</h3>
<input id="bill" type="number" step="0.01" placeholder="100" style="width:120px">
<h3>Tip %</h3>
<input id="pct" type="number" step="1" value="15" style="width:80px">
<h3>Split (people)</h3>
<input id="split" type="number" min="1" value="1" style="width:80px">
<br><br>
<button onclick="calc()">Calculate</button>
<h3>Result</h3>
<p>Tip: <span id="tip"></span></p>
<p>Total: <span id="total"></span></p>
<p>Per person: <span id="per"></span></p>
</div>
<script>
function calc(){
var bill=parseFloat(document.getElementById("bill").value)
var pct=parseFloat(document.getElementById("pct").value)||0
var split=parseInt(document.getElementById("split").value,10)||1
if(!bill||bill<=0){document.getElementById("tip").innerText="";document.getElementById("total").innerText="";document.getElementById("per").innerText="Enter bill amount.";return}
var tip=bill*pct/100
var total=bill+tip
document.getElementById("tip").innerText=tip.toFixed(2)
document.getElementById("total").innerText=total.toFixed(2)
document.getElementById("per").innerText=(total/split).toFixed(2)
}
</script>
</body>
</html>

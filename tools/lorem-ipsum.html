<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Lorem Ipsum Generator - ToolForge</title>
<meta name="description" content="Lorem Ipsum Generator free online tool">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container">

<h1>Lorem Ipsum Generator</h1>

<p>Generate placeholder text for layouts and mockups.</p>

<h3>Paragraphs</h3>
<input id="count" type="number" value="3" min="1" max="20" style="width:80px">

<br><br>

<button onclick="generate()">Generate</button>

<h3 style="margin-top:24px">Result</h3>
<textarea id="output" rows="10" style="width:90%"></textarea>

</div>

<script>

const LOREM_SENTENCES=[
"Lorem ipsum dolor sit amet, consectetur adipiscing elit.",
"Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.",
"Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.",
"Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.",
"Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.",
"Curabitur non nulla sit amet nisl tempus convallis quis ac lectus.",
"Vivamus suscipit tortor eget felis porttitor volutpat.",
"Nulla porttitor accumsan tincidunt.",
"Donec sollicitudin molestie malesuada.",
"Pellentesque in ipsum id orci porta dapibus."
]

function generate(){

let n=parseInt(document.getElementById("count").value,10)
if(isNaN(n)||n<1) n=1
if(n>20) n=20
document.getElementById("count").value=n

let paras=[]

for(let i=0;i<n;i++){
let len=3+Math.floor(Math.random()*4) // 3-6 sentences
let sentences=[]
for(let j=0;j<len;j++){
let idx=Math.floor(Math.random()*LOREM_SENTENCES.length)
sentences.push(LOREM_SENTENCES[idx])
}
paras.push(sentences.join(" "))
}

document.getElementById("output").value=paras.join("\\n\\n")

}

</script>

</body>
</html>

<link rel="stylesheet" href="/css/style.css">

<style>

textarea{
width:90%;
font-family:monospace;
}

pre{
background:#1e1e1e;
color:#eee;
padding:15px;
border-radius:6px;
overflow:auto;
width:90%;
}

.key{color:#9cdcfe}
.string{color:#ce9178}
.number{color:#b5cea8}
.boolean{color:#569cd6}
.null{color:#569cd6}

.error{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<main class="container">

<h1>JSON Viewer</h1>

<p class="subtitle">Format, validate and highlight JSON instantly for API responses, config files and logs.</p>

<p><a href="/">Back to all tools on ToolForge</a></p>

<label for="input" class="sr-only">Input</label>
<textarea id="input" rows="12" placeholder='{"name":"toolforge","age":3}' aria-label="Input"></textarea>

<br><br>

<button onclick="formatJSON()">Format</button>

<button onclick="compressJSON()">Compress</button>

<button onclick="clearText()">Clear</button>

<button onclick="copyResult()">Copy Result</button>

<h3>Result</h3>

<div id="result"></div>

<p id="status" class="inline-status"></p>

</main>

<script>

let latestResultText=""

function syntaxHighlight(json){

json=json.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")

return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,function(match){

let cls="number"

if(/^"/.test(match)){

if(/:$/.test(match)){

cls="key"

}else{

cls="string"

}

}else if(/true|false/.test(match)){

cls="boolean"

}else if(/null/.test(match)){

cls="null"

}

return '<span class="'+cls+'">'+match+'</span>'

})

}

function formatJSON(){

let text=document.getElementById("input").value

try{

let obj=JSON.parse(text)

let formatted=JSON.stringify(obj,null,4)

let highlighted=syntaxHighlight(formatted)

document.getElementById("result").innerHTML="<pre>"+highlighted+"</pre>"
latestResultText=formatted
document.getElementById("status").innerText="Formatted successfully."
document.getElementById("status").style.color="#16a34a"

}catch(e){

document.getElementById("result").innerHTML="<div class='error'>Invalid JSON: "+e.message+"</div>"
latestResultText=""
document.getElementById("status").innerText="Invalid JSON."
document.getElementById("status").style.color="#b91c1c"

}

}

function compressJSON(){

let text=document.getElementById("input").value

try{

let obj=JSON.parse(text)

let compressed=JSON.stringify(obj)

document.getElementById("result").innerHTML="<pre>"+compressed+"</pre>"
latestResultText=compressed
document.getElementById("status").innerText="Compressed successfully."
document.getElementById("status").style.color="#16a34a"

}catch(e){

document.getElementById("result").innerHTML="<div class='error'>Invalid JSON</div>"
latestResultText=""
document.getElementById("status").innerText="Invalid JSON."
document.getElementById("status").style.color="#b91c1c"

}

}

function clearText(){

document.getElementById("input").value=""

document.getElementById("result").innerHTML=""
latestResultText=""
document.getElementById("status").innerText=""

}

function copyResult(){
if(!latestResultText){
document.getElementById("status").innerText="Nothing to copy."
document.getElementById("status").style.color="#b91c1c"
return
}
navigator.clipboard.writeText(latestResultText).then(function(){
document.getElementById("status").innerText="Result copied."
document.getElementById("status").style.color="#16a34a"
}).catch(function(){
document.getElementById("status").innerText="Copy failed."
document.getElementById("status").style.color="#b91c1c"
})

}

</script>

</body>

</html>

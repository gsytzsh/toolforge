<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Password Strength Checker - ToolForge</title>
<meta name="description" content="Password Strength Checker free online tool">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container">

<h1>Password Strength Checker</h1>

<p>Type a password to see its strength score and suggestions.</p>

<h3>Password</h3>
<input id="pwd" type="password" style="width:320px" placeholder="Enter password" oninput="check()">
<label style="margin-left:10px;font-size:13px;">
<input type="checkbox" id="toggle" onclick="toggleVisible()"> Show
</label>

<h3 style="margin-top:24px">Strength</h3>
<p><b>Score:</b> <span id="scoreText"></span></p>
<p><b>Label:</b> <span id="labelText"></span></p>

<div style="margin:10px 0;width:260px;height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden">
<div id="bar" style="height:100%;width:0;background:#ef4444;transition:width 0.15s,background 0.15s"></div>
</div>

<h3>Suggestions</h3>
<ul id="suggestions"></ul>

</div>

<script>

function toggleVisible(){
let pwd=document.getElementById("pwd")
pwd.type=document.getElementById("toggle").checked?"text":"password"
}

function evaluatePassword(pwd){
let score=0
let suggestions=[]

if(!pwd){
suggestions.push("Password is empty.")
return {score:0,label:"Very weak",suggestions}
}

let length=pwd.length
let hasLower=/[a-z]/.test(pwd)
let hasUpper=/[A-Z]/.test(pwd)
let hasDigit=/[0-9]/.test(pwd)
let hasSymbol=/[^A-Za-z0-9]/.test(pwd)

// length
if(length>=8) score+=1
if(length>=12) score+=1
if(length>=16) score+=1

// variety
let varietyCount=(hasLower?1:0)+(hasUpper?1:0)+(hasDigit?1:0)+(hasSymbol?1:0)
if(varietyCount>=2) score+=1
if(varietyCount>=3) score+=1
if(varietyCount===4) score+=1

// simple patterns penalty
if(/^[a-z]+$/.test(pwd) || /^[0-9]+$/.test(pwd)){
score=Math.max(0,score-1)
}

// cap score
if(score<0) score=0
if(score>6) score=6

if(length<8) suggestions.push("Use at least 8 characters.")
if(length<12) suggestions.push("Longer is better, aim for 12+ characters.")
if(!hasLower) suggestions.push("Add lowercase letters.")
if(!hasUpper) suggestions.push("Add uppercase letters.")
if(!hasDigit) suggestions.push("Add digits.")
if(!hasSymbol) suggestions.push("Add symbols like !@#$%.")
if(/(.)\1{2,}/.test(pwd)) suggestions.push("Avoid repeating the same character many times.")
if(/1234|abcd|qwer|password|admin/i.test(pwd)) suggestions.push("Avoid common sequences or words.")

let label="Very weak"
if(score>=1) label="Weak"
if(score>=3) label="Medium"
if(score>=4) label="Strong"
if(score>=6) label="Very strong"

return {score,label,suggestions}
}

function render(result){
let scoreText=document.getElementById("scoreText")
let labelText=document.getElementById("labelText")
let bar=document.getElementById("bar")
let list=document.getElementById("suggestions")

scoreText.innerText=result.score+" / 6"
labelText.innerText=result.label

let percent=(result.score/6)*100
bar.style.width=percent+"%"

let color="#ef4444"
if(result.score>=3) color="#f59e0b"
if(result.score>=4) color="#3b82f6"
if(result.score>=6) color="#16a34a"
bar.style.background=color

list.innerHTML=""
result.suggestions.forEach(s=>{
let li=document.createElement("li")
li.innerText=s
list.appendChild(li)
})
}

function check(){
let pwd=document.getElementById("pwd").value
let res=evaluatePassword(pwd)
render(res)
}

// initial state
render(evaluatePassword(""))

</script>

</body>
</html>
